<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 커피 — 앱 다운로드</title>
<style>
  :root { --coffee: #6F4E37; --accent: #D2691E; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8e0d5 100%);
    min-height: 100vh; padding: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: white; padding: 36px 28px;
    border-radius: 16px; box-shadow: 0 10px 40px rgba(111,78,55,0.12);
    max-width: 380px; width: 100%; text-align: center;
  }
  h1 { color: var(--coffee); font-size: 1.5rem; margin-bottom: 8px; }
  .sub { color: #8a7f78; font-size: 0.9rem; margin-bottom: 24px; }
  .download {
    display: inline-block; padding: 14px 28px;
    background: var(--coffee); color: white;
    text-decoration: none; border-radius: 10px;
    font-weight: 600; font-size: 1rem;
    min-width: 200px;
  }
  .download:hover { background: #8B6F47; }
  .note {
    margin-top: 20px; font-size: 0.8rem; color: #8a7f78; line-height: 1.5;
  }
  .other-app {
    margin-top: 22px; padding-top: 18px;
    border-top: 1px dashed #e2dcd2;
    font-size: 0.85rem; color: #8a7f78;
  }
  .other-app a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .other-app a:hover { text-decoration: underline; }
  .back { display: block; margin-top: 20px; color: var(--coffee); text-decoration: none; font-size: 0.9rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>☕ 오늘의 커피 앱</h1>
    <p class="sub">안드로이드에서 바로 열어보세요</p>
    <a class="download" href="/static/downloads/cafe-coffee-latest.apk" download>APK 다운로드</a>
    <p class="note">
      설치 시 "출처를 알 수 없는 앱"을 허용해야 할 수 있습니다.<br>
      웹 브라우저로 이용하려면 <a href="/">여기를 누르세요</a>.
    </p>
    <div class="other-app">
      🎲 누가쏠까 게임만 따로 받고 싶다면 → <a href="/game-apk">game.apk 다운로드</a>
    </div>
    <a class="back" href="/">← 돌아가기</a>
  </div>
</body>
</html>
