<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 커피 — 앱 다운로드</title>
<style>
  :root { --coffee: #6F4E37; --accent: #D2691E; --gold: #DAA520; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8e0d5 100%);
    min-height: 100vh; padding: 24px;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: white; padding: 36px 28px;
    border-radius: 16px; box-shadow: 0 10px 40px rgba(111,78,55,0.12);
    max-width: 420px; width: 100%; text-align: center;
  }
  h1 { color: var(--coffee); font-size: 1.5rem; margin-bottom: 8px; }
  .sub { color: #8a7f78; font-size: 0.9rem; margin-bottom: 28px; }

  .app-row {
    display: flex; flex-direction: column; gap: 12px;
    align-items: stretch;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px dashed #e2dcd2;
  }
  .app-row:last-of-type { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .app-name {
    font-size: 1rem; font-weight: 700; color: var(--coffee);
    text-align: left;
  }
  .app-desc {
    font-size: 0.82rem; color: #8a7f78; line-height: 1.4;
    text-align: left;
  }
  .download {
    display: inline-block; padding: 14px 22px;
    color: white; font-weight: 600; font-size: 1rem;
    text-decoration: none; border-radius: 10px;
    width: 100%;
  }
  .download.coffee {
    background: var(--coffee);
  }
  .download.coffee:hover { background: #8B6F47; }
  .download.game {
    background: linear-gradient(135deg, #B8860B 0%, #DAA520 50%, #B8860B 100%);
    color: #3d2518;
    box-shadow: 0 4px 14px rgba(218,165,32,0.35);
  }
  .download.game:hover { filter: brightness(1.05); }

  .note {
    margin-top: 22px; font-size: 0.8rem; color: #8a7f78; line-height: 1.5;
  }
  .back { display: block; margin-top: 18px; color: var(--coffee); text-decoration: none; font-size: 0.9rem; }
</style>
</head>
<body>
  <div class="card">
    <h1>☕ 오늘의 커피 앱</h1>
    <p class="sub">안드로이드에서 바로 열어보세요</p>

    <div class="app-row">
      <div>
        <div class="app-name">☕ 오늘의 커피</div>
        <div class="app-desc">매장 오늘의 커피 + 누가쏠까 게임 포함</div>
      </div>
      <a class="download coffee" href="/static/downloads/cafe-coffee-latest.apk" download>오늘의 커피 APK</a>
    </div>

    <div class="app-row">
      <div>
        <div class="app-name">🎲 누가 쏠까?</div>
        <div class="app-desc">손가락 게임 + 룰렛 — 게임만 따로 받기</div>
      </div>
      <a class="download game" href="/static/downloads/game-latest.apk" download>game.apk 다운로드</a>
    </div>

    <p class="note">
      설치 시 "출처를 알 수 없는 앱"을 허용해야 할 수 있습니다.<br>
      웹 브라우저로 이용하려면 <a href="/">여기를 누르세요</a>.
    </p>
    <a class="back" href="/">← 돌아가기</a>
  </div>
</body>
</html>
