<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 커피 — 관리</title>
<style>
  :root {
    --coffee-dark: #6F4E37;
    --coffee-mid: #8B6F47;
    --coffee-light: #8B7355;
    --accent: #D2691E;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #e5ddd3;
    --text: #2a2320;
    --muted: #8a7f78;
    --danger: #c62828;
    --success: #2e7d32;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8e0d5 100%);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 560px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding: 16px 4px;
  }
  header h1 {
    font-size: 1.4rem; color: var(--coffee-dark); font-weight: 700;
  }
  .back-link {
    color: var(--coffee-mid); text-decoration: none; font-size: 0.95rem;
    padding: 8px 0; min-height: 44px; display: inline-flex; align-items: center;
  }
  .back-link:hover { color: var(--coffee-dark); }
  .app-version {
    font-size: 0.75rem; color: var(--muted); font-weight: 500;
    padding: 4px 10px; background: rgba(111,78,55,0.08);
    border-radius: 10px; display: none;
  }
  .app-version.show { display: inline-block; }

  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: 0 4px 20px rgba(111,78,55,0.08);
    padding: 24px; margin-bottom: 16px;
  }

  /* 기존 항목 리스트 */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .list-header h2 { font-size: 1.1rem; color: var(--coffee-dark); }
  .btn-new {
    background: var(--coffee-dark); color: white; border: none;
    padding: 10px 16px; border-radius: 8px; font-size: 0.9rem;
    cursor: pointer; min-height: 44px; font-weight: 600;
  }
  .btn-new:hover { background: var(--coffee-mid); }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn-text {
    background: #f0ebe4; color: var(--coffee-dark); border: none;
    padding: 10px 14px; border-radius: 8px; font-size: 0.9rem;
    cursor: pointer; min-height: 44px; font-weight: 600;
    font-family: inherit;
  }
  .btn-text:hover { background: #e6ddd0; }

  /* 달력 모달 */
  .calendar-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px 16px; z-index: 250; overflow-y: auto;
  }
  .calendar-backdrop.hidden { display: none; }
  .calendar-panel {
    background: white; border-radius: var(--radius);
    width: 100%; max-width: 1200px; padding: 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .calendar-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .calendar-nav { display: flex; align-items: center; gap: 12px; }
  .calendar-nav h2 {
    color: var(--coffee-dark); font-size: 1.3rem;
    min-width: 140px; text-align: center;
  }
  .calendar-nav button {
    background: var(--coffee-dark); color: white; border: none;
    width: 40px; height: 40px; border-radius: 8px; font-size: 1.3rem;
    cursor: pointer; line-height: 1;
  }
  .calendar-nav button:hover { background: var(--coffee-mid); }
  .cal-today-btn {
    background: #f0ebe4 !important; color: var(--coffee-dark) !important;
    width: auto !important; padding: 0 14px; font-size: 0.85rem !important;
    font-weight: 600;
  }
  .cal-close {
    background: transparent; color: var(--muted); border: none;
    font-size: 1.6rem; cursor: pointer; padding: 4px 12px; line-height: 1;
  }
  .cal-close:hover { color: var(--coffee-dark); }

  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-day-header {
    text-align: center; font-weight: 700; padding: 8px 0;
    font-size: 0.9rem; color: var(--coffee-dark);
  }
  .cal-day-header.sun { color: #c62828; }
  .cal-day-header.sat { color: #1565c0; }

  .cal-cell {
    min-height: 140px; padding: 6px;
    background: #faf8f5; border-radius: 6px;
    display: flex; flex-direction: column; gap: 4px;
    overflow: hidden; border: 1px solid transparent;
  }
  .cal-cell-out { background: #f0ede8; opacity: 0.6; }
  .cal-cell-today { border-color: var(--accent); background: #fff8f0; }

  .cal-date {
    font-size: 0.85rem; color: var(--muted); font-weight: 600;
    padding: 2px 4px;
  }
  .cal-date.sun { color: #c62828; }
  .cal-date.sat { color: #1565c0; }
  .cal-date-today {
    background: var(--accent); color: white !important;
    border-radius: 12px; padding: 2px 10px; align-self: flex-start;
  }

  .cal-coffees {
    display: flex; flex-direction: column; gap: 4px;
    flex: 1; overflow: hidden;
  }
  .cal-coffee {
    padding: 6px 8px; border-radius: 5px;
    border-left: 4px solid transparent;
  }
  .cal-coffee-name {
    font-weight: 700; font-size: 0.95rem; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis;
    word-break: keep-all;
  }
  .cal-coffee-roast {
    font-size: 0.72rem; margin-top: 2px; opacity: 0.85;
  }
  /* 상태별 색상 (공개 페이지와 동일) */
  .cal-coffee-예정    { background: #E1F5FE; border-left-color: #0277BD; color: #01579B; }
  .cal-coffee-진행중  { background: #E8F5E9; border-left-color: #2E7D32; color: #1B5E20; }
  .cal-coffee-완료    { background: #ECECEC; border-left-color: #757575; color: #424242; }
  .cal-coffee-soldout .cal-coffee-name { text-decoration: line-through; opacity: 0.7; }

  @media (max-width: 720px) {
    .calendar-panel { padding: 12px; }
    .cal-cell { min-height: 88px; padding: 3px; gap: 2px; }
    .cal-coffee { padding: 4px 5px; }
    .cal-coffee-name { font-size: 0.75rem; }
    .cal-coffee-roast { font-size: 0.62rem; }
    .cal-date { font-size: 0.72rem; padding: 1px 3px; }
    .cal-day-header { font-size: 0.78rem; padding: 4px 0; }
    .calendar-nav h2 { font-size: 1.05rem; min-width: 110px; }
    .calendar-nav button { width: 34px; height: 34px; font-size: 1.1rem; }
  }
  .list-items { display: flex; flex-direction: column; gap: 8px; }
  .list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 14px; background: #faf8f5; border-radius: 8px;
    border-left: 3px solid var(--accent); cursor: pointer;
    transition: background 0.15s;
  }
  .list-item:hover { background: #f3efe8; }
  .list-item-main { flex: 1; min-width: 0; }
  .list-item-name {
    font-weight: 600; color: var(--coffee-dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-item-meta { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .status-chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 0.75rem; font-weight: 600;
    margin-left: 8px; flex-shrink: 0;
  }
  .status-예정 { background: #e1f5fe; color: #0277bd; }
  .status-진행중 { background: #e8f5e9; color: #2e7d32; }
  .status-완료 { background: #eeeeee; color: #616161; }
  .list-item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .btn-duplicate {
    background: #f0ebe4; color: var(--coffee-dark); border: none;
    padding: 6px 10px; border-radius: 14px; font-size: 0.75rem;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-duplicate:hover { background: #e6ddd0; }
  .btn-availability {
    background: #E8F5E9; color: #2E7D32; border: none;
    padding: 6px 10px; border-radius: 14px; font-size: 0.75rem;
    font-weight: 600; cursor: pointer; font-family: inherit;
    min-width: 56px;
  }
  .btn-availability:hover { background: #c8e6c9; }
  .btn-availability.sold-out {
    background: #FFEBEE; color: #c62828;
  }
  .btn-availability.sold-out:hover { background: #ffcdd2; }
  .btn-image {
    background: #FFF3E0; color: #E65100; border: none;
    padding: 6px 10px; border-radius: 14px; font-size: 0.75rem;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn-image:hover { background: #FFE0B2; }
  .btn-image:disabled { opacity: 0.6; cursor: wait; }
  .list-item.sold-out .list-item-name {
    text-decoration: line-through; opacity: 0.65;
  }
  .list-item.sold-out .list-item-meta { opacity: 0.55; }

  /* 고정 로스터리 표시 (입력 불가) */
  .roastery-fixed {
    padding: 12px 14px; background: #faf8f5;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 1rem; color: var(--coffee-mid); font-weight: 600;
    display: flex; align-items: center; min-height: 48px;
  }

  /* 폼 */
  form { display: none; }
  form.active { display: block; }
  .field { margin-bottom: 18px; }
  label {
    display: block; font-weight: 600; font-size: 0.9rem;
    color: var(--coffee-dark); margin-bottom: 6px;
  }
  .req::after { content: " *"; color: var(--accent); }
  .label-hint {
    font-weight: 400; font-size: 0.78rem; color: var(--muted);
    margin-left: 4px;
  }
  input[type="text"], input[type="date"], textarea, select {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 1rem; font-family: inherit;
    background: white; color: var(--text);
    min-height: 48px;
  }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(210,105,30,0.15);
  }
  textarea { min-height: 88px; resize: vertical; }
  .field.error input, .field.error textarea, .field.error select {
    border-color: var(--danger);
  }
  .field-error {
    color: var(--danger); font-size: 0.85rem; margin-top: 4px;
    display: none;
  }
  .field.error .field-error { display: block; }

  /* 세그먼트 (상태) */
  .segmented {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .segmented.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .segmented button {
    padding: 12px 8px; border: none; background: white;
    font-size: 0.95rem; font-family: inherit; cursor: pointer;
    color: var(--muted); font-weight: 500; min-height: 48px;
    border-right: 1px solid var(--border);
  }
  .segmented button:last-child { border-right: none; }
  .segmented button.active {
    background: var(--coffee-dark); color: white; font-weight: 600;
  }

  /* 컵노트 칩 */
  .chips {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .chip {
    padding: 6px 10px; background: #faf8f5; border: 1px solid var(--border);
    border-radius: 14px; font-size: 0.8rem; cursor: pointer;
    color: var(--coffee-mid);
  }
  .chip:hover { background: #f0e6d9; }
  .chip.selected {
    background: var(--coffee-dark); color: white;
    border-color: var(--coffee-dark);
  }
  .chip.selected:hover { background: var(--coffee-mid); }

  /* 커스텀 드롭다운 */
  .autocomplete-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; left: 0; right: 0; top: 100%; z-index: 50;
    background: white; border: 1.5px solid var(--border); border-top: none;
    border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto;
    box-shadow: 0 6px 16px rgba(0,0,0,0.1); display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 10px 14px; cursor: pointer; font-size: 0.95rem;
  }
  .autocomplete-item:hover, .autocomplete-item.highlight {
    background: #f3efe8; color: var(--coffee-dark);
  }

  /* 제공일 토글 */
  .toggle-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    font-size: 0.85rem; color: var(--muted);
  }
  .toggle-row input[type="checkbox"] { width: 18px; height: 18px; }

  /* 버튼 바 */
  .button-bar {
    display: flex; gap: 12px; padding-top: 12px;
    position: sticky; bottom: 0; background: var(--card);
    margin: 0 -24px -24px; padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 14px; border-radius: 10px; border: none;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    min-height: 52px; font-family: inherit;
  }
  .btn-primary { background: var(--coffee-dark); color: white; }
  .btn-primary:hover:not(:disabled) { background: var(--coffee-mid); }
  .btn-primary:disabled { background: #a89d93; cursor: not-allowed; }
  .btn-secondary { background: #f0ebe4; color: var(--coffee-dark); }
  .btn-secondary:hover { background: #e6ddd0; }
  .btn-danger {
    flex: 0 0 auto; background: transparent; color: var(--danger);
    border: 1.5px solid #f3c5c5;
  }
  .btn-danger:hover { background: #fff0f0; }

  /* 배너 */
  .banner {
    padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
    font-size: 0.9rem; display: none;
  }
  .banner.error { background: #ffebee; color: var(--danger); display: block; }
  .banner.success { background: #e8f5e9; color: var(--success); display: block; }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--coffee-dark); color: white;
    padding: 12px 20px; border-radius: 22px; font-size: 0.9rem;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    opacity: 0; transition: opacity 0.25s;
    pointer-events: none; z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* PIN 모달 */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; z-index: 200;
  }
  .modal-backdrop.hidden { display: none; }
  .modal {
    background: white; border-radius: var(--radius);
    padding: 28px 24px; max-width: 340px; width: 100%;
  }
  .modal h2 {
    color: var(--coffee-dark); font-size: 1.2rem; margin-bottom: 8px;
  }
  .modal p { color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; }
  .modal input {
    text-align: center; letter-spacing: 4px; font-size: 1.3rem;
    font-weight: 600;
  }
  .modal .button-bar {
    position: static; margin: 16px 0 0; padding: 0; border: none;
  }

  /* 스피너 */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-right: 8px; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center; padding: 32px 16px; color: var(--muted);
    font-size: 0.9rem;
  }

  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; }
    .toast { transition: none; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <a href="/" class="back-link">← 목록으로</a>
    <h1>☕ 오늘의 커피 관리</h1>
    <span id="app-version" class="app-version"></span>
  </header>

  <div id="banner" class="banner" role="alert" aria-live="polite"></div>

  <!-- 기존 항목 리스트 -->
  <section id="list-view" class="card">
    <div class="list-header">
      <h2>기록된 커피</h2>
      <div class="header-actions">
        <button class="btn-text" type="button" id="btn-calendar">📅 달력</button>
        <button class="btn-text" type="button" id="btn-text">📋 텍스트</button>
        <button class="btn-new" type="button" id="btn-new">+ 새로 추가</button>
      </div>
    </div>
    <div id="list-items" class="list-items">
      <div class="empty">불러오는 중...</div>
    </div>
  </section>

  <!-- 추가/편집 폼 -->
  <section id="form-view" class="card" style="display:none;">
    <form id="coffee-form" novalidate>
      <input type="hidden" name="id" id="field-id">

      <div class="field">
        <label for="field-name" class="req">원두 이름</label>
        <div class="autocomplete-wrap">
          <input type="text" id="field-name" name="name"
                 placeholder="예: 에티오피아 예가체프" autocomplete="off"
                 aria-required="true" required>
          <div class="autocomplete-list" id="ac-name"></div>
        </div>
        <div class="field-error">원두 이름을 입력하세요.</div>
      </div>

      <div class="field">
        <label>로스터리</label>
        <div class="roastery-fixed">92도씨 로스터리</div>
        <input type="hidden" name="roastery" id="field-roastery" value="92도씨 로스터리">
      </div>

      <div class="field">
        <label for="field-roast-date" class="req">로스팅 일자</label>
        <input type="date" id="field-roast-date" name="roast_date" aria-required="true" required>
        <div class="field-error">로스팅 일자를 선택하세요.</div>
      </div>

      <div class="field">
        <label for="field-process" class="req">프로세싱</label>
        <div class="autocomplete-wrap">
          <input type="text" id="field-process" name="process"
                 placeholder="예: 내추럴, 워시드" autocomplete="off"
                 aria-required="true" required>
          <div class="autocomplete-list" id="ac-process"></div>
        </div>
        <div class="field-error">프로세싱을 입력하세요.</div>
      </div>

      <div class="field">
        <label>구분</label>
        <div class="segmented cols-2" role="radiogroup" aria-label="구분">
          <button type="button" data-category="원두">원두</button>
          <button type="button" data-category="브루잉">브루잉</button>
        </div>
        <input type="hidden" name="category" id="field-category" value="">
      </div>

      <div class="field">
        <label for="field-brewed-at">BREWED AT (°C)</label>
        <input type="number" id="field-brewed-at" name="brewed_at"
               min="60" max="100" step="1" placeholder="예: 92" inputmode="numeric">
      </div>

      <div class="field">
        <label for="field-roast-point">로스팅 포인트 <span class="label-hint">(LIGHT:30 MEDIUM:60 DARK:80)</span></label>
        <input type="number" id="field-roast-point" name="roast_point"
               min="0" max="100" step="1" placeholder="예: 60" inputmode="numeric">
      </div>

      <div class="field">
        <label>상태</label>
        <div class="segmented" role="radiogroup" aria-label="상태">
          <button type="button" data-status="예정">예정</button>
          <button type="button" data-status="진행 중">진행 중</button>
          <button type="button" data-status="완료">완료</button>
        </div>
        <input type="hidden" name="status" id="field-status" value="예정">
      </div>

      <div class="field">
        <label>운영 상태 <span class="label-hint">(품절은 텍스트·카드 데이터에서 제외)</span></label>
        <div class="segmented cols-2" role="radiogroup" aria-label="운영 상태">
          <button type="button" data-availability="운영">🟢 운영</button>
          <button type="button" data-availability="품절">⛔ 품절</button>
        </div>
        <input type="hidden" name="availability" id="field-availability" value="운영">
      </div>

      <div class="field">
        <label for="field-cup-notes" class="req">컵노트</label>
        <textarea id="field-cup-notes" name="cup_notes"
                  placeholder="예: 자몽, 블랙베리, 다크초콜릿"
                  aria-required="true" required></textarea>
        <div class="field-error">컵노트를 입력하세요.</div>
        <div class="chips" id="cup-notes-chips"></div>
      </div>

      <div class="field">
        <label for="field-comment">감상</label>
        <textarea id="field-comment" name="comment"
                  placeholder="개인적인 느낌, 추출 메모 등"></textarea>
      </div>

      <div class="field">
        <label for="field-serve-date">제공일</label>
        <input type="date" id="field-serve-date" name="serve_date">
      </div>

      <div class="button-bar">
        <button type="button" class="btn btn-secondary" id="btn-cancel">취소</button>
        <button type="button" class="btn btn-danger" id="btn-delete" style="display:none;">삭제</button>
        <button type="submit" class="btn btn-primary" id="btn-save">저장</button>
      </div>
    </form>
  </section>
</div>

<!-- 달력 모달 -->
<div class="calendar-backdrop hidden" id="calendar-modal">
  <div class="calendar-panel">
    <div class="calendar-header">
      <div class="calendar-nav">
        <button type="button" id="cal-prev" aria-label="이전 달">‹</button>
        <h2 id="cal-title">—</h2>
        <button type="button" id="cal-next" aria-label="다음 달">›</button>
        <button type="button" id="cal-today" class="cal-today-btn">오늘</button>
      </div>
      <button type="button" class="cal-close" id="cal-close" aria-label="닫기">✕</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
  </div>
</div>

<!-- 텍스트 팝업 모달 -->
<div class="modal-backdrop hidden" id="text-modal">
  <div class="modal" style="max-width: 560px;">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px;">
      <h2>커피 텍스트 (로스팅 최신순)</h2>
      <button type="button" class="btn-text" id="btn-copy">📋 복사하기</button>
    </div>
    <textarea id="text-output" readonly
              style="width:100%; min-height:360px; max-height:60vh; padding:12px;
                     font-family: ui-monospace, Menlo, Consolas, monospace;
                     font-size:0.82rem; line-height:1.5;
                     border:1.5px solid var(--border); border-radius:8px;
                     background:#faf8f5; color:var(--text); resize:vertical;"></textarea>

<!-- PIN 모달 -->
<div class="modal-backdrop" id="pin-modal">
  <div class="modal">
    <h2>관리자 인증</h2>
    <p>PIN을 입력하세요.</p>
    <input type="password" inputmode="numeric" pattern="[0-9]*"
           id="pin-input" maxlength="8" autocomplete="off">
    <div id="pin-error" style="color:var(--danger); font-size:0.85rem; margin-top:8px; display:none;">
      PIN이 올바르지 않습니다.
    </div>
    <div class="button-bar">
      <button type="button" class="btn btn-primary" id="pin-submit">확인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

const banner = $("#banner");
const toast = $("#toast");
const listView = $("#list-view");
const formView = $("#form-view");
const form = $("#coffee-form");
const pinModal = $("#pin-modal");

let editingId = null;
let suggestionsCache = null;

// ---------- API helpers ----------
async function api(method, path, body) {
  const opts = {
    method,
    credentials: "include",
    headers: { "Content-Type": "application/json" },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) {
    showPinModal();
    throw new Error("unauthorized");
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

// ---------- PIN ----------
function showPinModal() { pinModal.classList.remove("hidden"); $("#pin-input").focus(); }
function hidePinModal() { pinModal.classList.add("hidden"); }

$("#pin-submit").addEventListener("click", async () => {
  const pin = $("#pin-input").value.trim();
  try {
    await api("POST", "/api/admin/verify", { pin });
    hidePinModal();
    $("#pin-error").style.display = "none";
    $("#pin-input").value = "";
    init();
  } catch (e) {
    $("#pin-error").style.display = "block";
  }
});
$("#pin-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("#pin-submit").click();
});

// ---------- 리스트 ----------
async function loadList() {
  try {
    const data = await api("GET", "/api/coffee/all");
    renderList(data.items || []);
  } catch (e) {
    if (e.message !== "unauthorized") showBanner("목록을 불러오지 못했습니다: " + e.message, "error");
  }
}

function renderList(items) {
  const el = $("#list-items");
  if (!items.length) {
    el.innerHTML = '<div class="empty">기록된 커피가 없습니다. "새로 추가"를 눌러 시작하세요.</div>';
    return;
  }
  el.innerHTML = items.map((it) => {
    const roast = it["로스팅"]?.start || "";
    const serve = it["제공일"]?.start || "";
    const status = it["상태"] || "";
    const statusCls = status.replace(/\s/g, "");
    const availability = it["운영상태"] || "운영";
    const isSold = availability === "품절";
    const dupBtn = status === "완료"
      ? `<button type="button" class="btn-duplicate" data-id="${it.id}">복제</button>`
      : "";
    const availBtn = `<button type="button" class="btn-availability ${isSold ? 'sold-out' : ''}" data-id="${it.id}" data-availability="${availability}">${isSold ? '⛔ 품절' : '🟢 운영'}</button>`;
    const imgBtn = `<button type="button" class="btn-image" data-id="${it.id}" data-name="${escapeAttr(it["커피"] || "card")}">🖼️ 이미지</button>`;
    const dateParts = [];
    if (roast) dateParts.push("🫘 " + roast);
    if (serve) dateParts.push("☕ " + serve);
    const dateStr = dateParts.join(" · ");
    return `
      <div class="list-item ${isSold ? 'sold-out' : ''}" data-id="${it.id}">
        <div class="list-item-main">
          <div class="list-item-name">${escapeHtml(it["커피"] || "(이름 없음)")}</div>
          <div class="list-item-meta">
            ${escapeHtml(it["로스터리"] || "")}${it["로스터리"] && dateStr ? " · " : ""}${dateStr}
          </div>
        </div>
        <div class="list-item-actions">
          ${status ? `<span class="status-chip status-${statusCls}">${status}</span>` : ""}
          ${availBtn}
          ${imgBtn}
          ${dupBtn}
        </div>
      </div>
    `;
  }).join("");
  $$(".list-item").forEach((row) => {
    row.addEventListener("click", (e) => {
      if (e.target.closest(".btn-duplicate")) return;
      if (e.target.closest(".btn-availability")) return;
      if (e.target.closest(".btn-image")) return;
      openEdit(parseInt(row.dataset.id, 10));
    });
  });
  $$(".btn-duplicate").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      openDuplicate(parseInt(btn.dataset.id, 10));
    });
  });
  $$(".btn-availability").forEach((btn) => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id, 10);
      const next = btn.dataset.availability === "품절" ? "운영" : "품절";
      btn.disabled = true;
      try {
        const result = await api("PUT", "/api/coffee/" + id, { availability: next });
        const n = result && result.cascaded ? result.cascaded : 1;
        const label = next === "품절" ? "품절" : "운영";
        showToast(n > 1 ? `${label}로 변경 (같은 이름 ${n}개)` : `${label}로 변경`);
        await loadList();
      } catch (err) {
        if (err.message !== "unauthorized") showBanner("변경 실패: " + err.message, "error");
        btn.disabled = false;
      }
    });
  });
  $$(".btn-image").forEach((btn) => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id, 10);
      const name = btn.dataset.name || "card";
      const original = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="border-color:rgba(230,81,0,0.3);border-top-color:#E65100;"></span>';
      try {
        // APK v1.0.6+: 네이티브 DownloadListener 사용 (시스템 다운로드 폴더에 직접 저장)
        if (isAndroidWebView() && appVersionAtLeast("1.0.6")) {
          downloadViaNativeListener(`/api/coffee/${id}/card.png`);
          showToast("📥 다운로드 시작");
          return;
        }
        const res = await fetch(`/api/coffee/${id}/card.png`, { credentials: "include" });
        if (res.status === 401) { showPinModal(); return; }
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const safe = name.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "_") || "card";
        await saveOrShareImage(blob, `${safe}.png`);
      } catch (err) {
        showBanner("이미지 생성 실패: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.innerHTML = original;
      }
    });
  });
}

// ---------- 제안(datalist) ----------
async function loadSuggestions() {
  try {
    const s = await api("GET", "/api/suggestions");
    suggestionsCache = s;
    setupAutocomplete("field-name", "ac-name", s.name || []);
    setupAutocomplete("field-process", "ac-process", s.process || []);
    // 새 항목이면서 컵노트가 비어있으면 마지막 기록값 불러오기
    if (!editingId && !$("#field-cup-notes").value.trim() && s.last_cup_notes) {
      $("#field-cup-notes").value = s.last_cup_notes;
    }
    renderChips((s.cup_notes || []).slice(0, 20));
  } catch (e) {
    if (e.message !== "unauthorized") console.warn("제안 로드 실패:", e);
  }
}

function setupAutocomplete(inputId, listId, items) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  if (!input || !list) return;

  // 이전 리스너 제거를 위해 clone
  const newInput = input.cloneNode(true);
  input.parentNode.replaceChild(newInput, input);

  let highlighted = -1;

  function render(filter) {
    const q = (filter || "").toLowerCase();
    const filtered = q
      ? items.filter(v => v.toLowerCase().includes(q))
      : items;
    if (!filtered.length) { list.classList.remove("open"); return; }
    list.innerHTML = filtered.map((v, i) =>
      `<div class="autocomplete-item" data-idx="${i}">${escapeHtml(v)}</div>`
    ).join("");
    list.classList.add("open");
    highlighted = -1;
    list.querySelectorAll(".autocomplete-item").forEach(el => {
      el.addEventListener("mousedown", (e) => {
        e.preventDefault();
        newInput.value = el.textContent;
        list.classList.remove("open");
      });
    });
  }

  newInput.addEventListener("focus", () => render(newInput.value));
  newInput.addEventListener("input", () => render(newInput.value));
  newInput.addEventListener("blur", () => {
    setTimeout(() => list.classList.remove("open"), 150);
  });
  newInput.addEventListener("keydown", (e) => {
    const visible = list.querySelectorAll(".autocomplete-item");
    if (!visible.length) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      highlighted = Math.min(highlighted + 1, visible.length - 1);
      visible.forEach((el, i) => el.classList.toggle("highlight", i === highlighted));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      highlighted = Math.max(highlighted - 1, 0);
      visible.forEach((el, i) => el.classList.toggle("highlight", i === highlighted));
    } else if (e.key === "Enter" && highlighted >= 0) {
      e.preventDefault();
      newInput.value = visible[highlighted].textContent;
      list.classList.remove("open");
    }
  });
}

function renderChips(notes) {
  const container = $("#cup-notes-chips");
  if (!notes.length) { container.innerHTML = ""; return; }
  container.innerHTML = notes.map((n) =>
    `<span class="chip" data-note="${escapeAttr(n)}">${escapeHtml(n)}</span>`
  ).join("");
  syncChipSelection();
  container.querySelectorAll(".chip").forEach((el) => {
    el.addEventListener("click", () => {
      const note = el.dataset.note;
      const parts = $("#field-cup-notes").value.split(",").map(s => s.trim()).filter(Boolean);
      const idx = parts.indexOf(note);
      if (idx >= 0) {
        parts.splice(idx, 1);
      } else {
        parts.push(note);
      }
      $("#field-cup-notes").value = parts.join(", ");
      syncChipSelection();
    });
  });
}

function syncChipSelection() {
  const selected = new Set(
    $("#field-cup-notes").value.split(",").map(s => s.trim()).filter(Boolean)
  );
  $$("#cup-notes-chips .chip").forEach((el) => {
    el.classList.toggle("selected", selected.has(el.dataset.note));
  });
}

// ---------- 폼 ----------
function showList() {
  listView.style.display = "";
  formView.style.display = "none";
  form.classList.remove("active");
  editingId = null;
}

function openNew() {
  editingId = null;
  form.reset();
  $("#field-id").value = "";
  $("#field-status").value = "예정";
  syncSegmented("예정");
  $("#field-category").value = "";
  syncCategory("");
  $("#field-brewed-at").value = "";
  $("#field-roast-point").value = "";
  $("#field-availability").value = "운영";
  syncAvailability("운영");
  $("#btn-delete").style.display = "none";
  $("#field-serve-date").value = "";
  clearErrors();
  listView.style.display = "none";
  formView.style.display = "";
  form.classList.add("active");
  $("#field-name").focus();
  loadSuggestions();
}

async function openDuplicate(id) {
  try {
    const data = await api("GET", "/api/coffee/" + id);
    const it = data.item;
    editingId = null;
    form.reset();
    $("#field-id").value = "";
    $("#field-name").value = it["커피"] || "";
    $("#field-roast-date").value = (it["로스팅"] && it["로스팅"].start) || "";
    $("#field-process").value = it["프로세싱"] || "";
    $("#field-cup-notes").value = it["컵노트"] || "";
    $("#field-comment").value = it["감상"] || "";
    const dupCat = it["구분"] || "";
    $("#field-category").value = dupCat;
    syncCategory(dupCat);
    $("#field-brewed-at").value = it["BREWED AT"] != null ? it["BREWED AT"] : "";
    $("#field-roast-point").value = it["로스팅 포인트"] != null ? it["로스팅 포인트"] : "";
    $("#field-status").value = "예정";
    syncSegmented("예정");
    $("#field-availability").value = "운영";
    syncAvailability("운영");
    $("#field-serve-date").value = "";
    $("#btn-delete").style.display = "none";
    clearErrors();
    listView.style.display = "none";
    formView.style.display = "";
    form.classList.add("active");
    $("#field-serve-date").focus();
    loadSuggestions();
    showToast("복제 — 제공일을 입력하세요");
  } catch (e) {
    if (e.message !== "unauthorized") showBanner("복제 실패: " + e.message, "error");
  }
}

async function openEdit(id) {
  try {
    const data = await api("GET", "/api/coffee/" + id);
    const it = data.item;
    editingId = id;
    form.reset();
    $("#field-id").value = id;
    $("#field-name").value = it["커피"] || "";
    $("#field-roast-date").value = (it["로스팅"] && it["로스팅"].start) || "";
    $("#field-process").value = it["프로세싱"] || "";
    $("#field-cup-notes").value = it["컵노트"] || "";
    $("#field-comment").value = it["감상"] || "";
    const editCat = it["구분"] || "";
    $("#field-category").value = editCat;
    syncCategory(editCat);
    $("#field-brewed-at").value = it["BREWED AT"] != null ? it["BREWED AT"] : "";
    $("#field-roast-point").value = it["로스팅 포인트"] != null ? it["로스팅 포인트"] : "";
    const status = it["상태"] || "예정";
    $("#field-status").value = status;
    syncSegmented(status);
    const editAv = it["운영상태"] || "운영";
    $("#field-availability").value = editAv;
    syncAvailability(editAv);
    $("#field-serve-date").value = (it["제공일"] && it["제공일"].start) || "";
    $("#btn-delete").style.display = "";
    clearErrors();
    listView.style.display = "none";
    formView.style.display = "";
    form.classList.add("active");
    loadSuggestions();
  } catch (e) {
    if (e.message !== "unauthorized") showBanner("불러오기 실패: " + e.message, "error");
  }
}

function syncSegmented(status) {
  $$(".segmented button[data-status]").forEach((b) => {
    b.classList.toggle("active", b.dataset.status === status);
    b.setAttribute("aria-pressed", b.dataset.status === status ? "true" : "false");
  });
}

$$(".segmented button[data-status]").forEach((b) => {
  b.addEventListener("click", () => {
    $("#field-status").value = b.dataset.status;
    syncSegmented(b.dataset.status);
    if (b.dataset.status === "진행 중" && !$("#field-serve-date").value) {
      $("#field-serve-date").value = new Date().toISOString().slice(0, 10);
    }
  });
});

function syncCategory(cat) {
  $$(".segmented button[data-category]").forEach((b) => {
    const on = b.dataset.category === cat;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
}

$$(".segmented button[data-category]").forEach((b) => {
  b.addEventListener("click", () => {
    const cur = $("#field-category").value;
    const next = cur === b.dataset.category ? "" : b.dataset.category;
    $("#field-category").value = next;
    syncCategory(next);
  });
});

function syncAvailability(av) {
  const v = av || "운영";
  $$(".segmented button[data-availability]").forEach((b) => {
    const on = b.dataset.availability === v;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });
}

$$(".segmented button[data-availability]").forEach((b) => {
  b.addEventListener("click", () => {
    $("#field-availability").value = b.dataset.availability;
    syncAvailability(b.dataset.availability);
  });
});

function clearErrors() {
  $$(".field.error").forEach((f) => f.classList.remove("error"));
  banner.className = "banner";
  banner.textContent = "";
}

function validate() {
  clearErrors();
  let ok = true;
  const requiredText = [
    "#field-name",
    "#field-process",
    "#field-cup-notes",
  ];
  for (const sel of requiredText) {
    if (!$(sel).value.trim()) {
      $(sel).closest(".field").classList.add("error");
      ok = false;
    }
  }
  if (!$("#field-roast-date").value) {
    $("#field-roast-date").closest(".field").classList.add("error");
    ok = false;
  }
  return ok;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (!validate()) return;

  const btn = $("#btn-save");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>저장 중...';

  const roastDate = $("#field-roast-date").value;
  const serveDate = $("#field-serve-date").value;

  const brewedAtRaw = $("#field-brewed-at").value.trim();
  const roastPointRaw = $("#field-roast-point").value.trim();

  const payload = {
    name: $("#field-name").value.trim(),
    roastery: "92도씨 로스터리",
    roast_date: roastDate,
    process: $("#field-process").value.trim() || null,
    status: $("#field-status").value,
    cup_notes: $("#field-cup-notes").value.trim() || null,
    comment: $("#field-comment").value.trim() || null,
    serve_date: serveDate || null,
    category: $("#field-category").value || null,
    brewed_at: brewedAtRaw === "" ? null : Number(brewedAtRaw),
    roast_point: roastPointRaw === "" ? null : Number(roastPointRaw),
    availability: $("#field-availability").value || "운영",
  };

  try {
    if (editingId) {
      await api("PUT", "/api/coffee/" + editingId, payload);
    } else {
      await api("POST", "/api/coffee", payload);
    }
    showToast(editingId ? "수정되었습니다" : "저장되었습니다");
    await loadList();
    showList();
  } catch (err) {
    if (err.message !== "unauthorized") showBanner("저장 실패: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "저장";
  }
});

$("#btn-cancel").addEventListener("click", showList);
$("#btn-new").addEventListener("click", openNew);

// ---------- 달력 ----------
let calendarMonth = null;
let calendarItems = null;

$("#btn-calendar").addEventListener("click", openCalendar);
$("#cal-close").addEventListener("click", () => $("#calendar-modal").classList.add("hidden"));
$("#cal-prev").addEventListener("click", () => changeCalendarMonth(-1));
$("#cal-next").addEventListener("click", () => changeCalendarMonth(1));
$("#cal-today").addEventListener("click", () => {
  const now = new Date();
  calendarMonth = { year: now.getFullYear(), month: now.getMonth() };
  renderCalendar();
});

async function openCalendar() {
  const now = new Date();
  calendarMonth = { year: now.getFullYear(), month: now.getMonth() };
  try {
    const data = await api("GET", "/api/coffee/all");
    calendarItems = data.items || [];
    renderCalendar();
    $("#calendar-modal").classList.remove("hidden");
  } catch (e) {
    if (e.message !== "unauthorized") showBanner("달력 로드 실패: " + e.message, "error");
  }
}

function changeCalendarMonth(delta) {
  const d = new Date(calendarMonth.year, calendarMonth.month + delta, 1);
  calendarMonth = { year: d.getFullYear(), month: d.getMonth() };
  renderCalendar();
}

function ymdLocal(d) {
  return d.getFullYear() + "-" +
         String(d.getMonth() + 1).padStart(2, "0") + "-" +
         String(d.getDate()).padStart(2, "0");
}

function renderCalendar() {
  const { year, month } = calendarMonth;
  $("#cal-title").textContent = year + "년 " + (month + 1) + "월";

  // 제공일 → 항목 매핑
  const byDate = {};
  for (const it of (calendarItems || [])) {
    const d = (it["제공일"] && it["제공일"].start) || "";
    if (!d) continue;
    (byDate[d] = byDate[d] || []).push(it);
  }

  // 첫 주 일요일 ~ 마지막 주 토요일까지 (이전·다음달 패딩 포함)
  const firstOfMonth = new Date(year, month, 1);
  const lastOfMonth = new Date(year, month + 1, 0);
  const gridStart = new Date(year, month, 1 - firstOfMonth.getDay());
  const gridEnd = new Date(year, month + 1, 6 - lastOfMonth.getDay());

  const dayLabels = ["일", "월", "화", "수", "목", "금", "토"];
  const dayCls = ["sun", "", "", "", "", "", "sat"];
  let html = "";
  for (let i = 0; i < 7; i++) {
    html += `<div class="cal-day-header ${dayCls[i]}">${dayLabels[i]}</div>`;
  }

  const today = ymdLocal(new Date());
  const cur = new Date(gridStart);
  while (cur <= gridEnd) {
    const ymd = ymdLocal(cur);
    const dow = cur.getDay();
    const inMonth = (cur.getMonth() === month);
    const isToday = (ymd === today);
    const items = byDate[ymd] || [];

    let cell = `<div class="cal-cell ${inMonth ? "" : "cal-cell-out"} ${isToday ? "cal-cell-today" : ""}">`;
    cell += `<div class="cal-date ${dayCls[dow]} ${isToday ? "cal-date-today" : ""}">${cur.getDate()}</div>`;
    if (items.length) {
      cell += `<div class="cal-coffees">`;
      for (const it of items) {
        const name = escapeHtml(it["커피"] || "");
        const roast = (it["로스팅"] && it["로스팅"].start) || "";
        const statusCls = String(it["상태"] || "").replace(/\s/g, "");
        const isSold = (it["운영상태"] || "운영") === "품절";
        cell += `<div class="cal-coffee cal-coffee-${statusCls} ${isSold ? 'cal-coffee-soldout' : ''}">`;
        cell += `<div class="cal-coffee-name">${name}</div>`;
        if (roast) cell += `<div class="cal-coffee-roast">🫘 ${escapeHtml(roast)}</div>`;
        cell += `</div>`;
      }
      cell += `</div>`;
    }
    cell += `</div>`;
    html += cell;
    cur.setDate(cur.getDate() + 1);
  }

  $("#calendar-grid").innerHTML = html;
}

// ---------- 텍스트 덤프 ----------
$("#btn-text").addEventListener("click", openTextDump);
$("#btn-text-close").addEventListener("click", () => $("#text-modal").classList.add("hidden"));
$("#btn-copy").addEventListener("click", async () => {
  const ta = $("#text-output");
  const text = ta.value;
  if (!text) { showToast("복사할 내용이 없습니다"); return; }
  try {
    await navigator.clipboard.writeText(text);
    showToast("복사되었습니다");
  } catch (e) {
    ta.removeAttribute("readonly");
    ta.select();
    try { document.execCommand("copy"); showToast("복사되었습니다"); }
    catch (err) { showToast("복사 실패 — 직접 선택해 복사하세요"); }
    ta.setAttribute("readonly", "");
  }
});

async function openTextDump() {
  try {
    const data = await api("GET", "/api/coffee/all");
    // 품절 항목은 텍스트·카드 참조 데이터에서 제외
    const items = (data.items || []).filter((it) => (it["운영상태"] || "운영") !== "품절");
    const sorted = items.slice().sort((a, b) => {
      const ad = (a["로스팅"] && a["로스팅"].start) || "";
      const bd = (b["로스팅"] && b["로스팅"].start) || "";
      return bd.localeCompare(ad);
    });
    const seen = new Set();
    const lines = [];
    const flat = (s) => String(s || "").trim().replace(/\s*\n\s*/g, " ");
    for (const it of sorted) {
      const name = flat(it["커피"]);
      if (!name) continue;
      const key = name.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      lines.push([name, flat(it["프로세싱"]), flat(it["컵노트"]), flat(it["감상"])].join(", "));
    }
    $("#text-output").value = lines.join("\n");
    $("#text-modal").classList.remove("hidden");
  } catch (e) {
    if (e.message !== "unauthorized") showBanner("텍스트 생성 실패: " + e.message, "error");
  }
}

$("#btn-delete").addEventListener("click", async () => {
  if (!editingId) return;
  if (!confirm("정말 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) return;
  try {
    await api("DELETE", "/api/coffee/" + editingId);
    showToast("삭제되었습니다");
    await loadList();
    showList();
  } catch (err) {
    if (err.message !== "unauthorized") showBanner("삭제 실패: " + err.message, "error");
  }
});

// ---------- 이미지 저장/공유 ----------
function isAndroidWebView() {
  return /Android.*wv\)|; wv\)/.test(navigator.userAgent);
}

function appVersionAtLeast(want) {
  const m = navigator.userAgent.match(/CafeCoffeeApp\/([\d.]+)/);
  if (!m) return false;
  const cur = m[1].split(".").map(Number);
  const tgt = want.split(".").map(Number);
  for (let i = 0; i < tgt.length; i++) {
    if ((cur[i] || 0) > tgt[i]) return true;
    if ((cur[i] || 0) < tgt[i]) return false;
  }
  return true;
}

function downloadViaNativeListener(url) {
  // APK v1.0.6+: MainActivity의 DownloadListener가 DownloadManager로 저장
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = url;
  document.body.appendChild(iframe);
  setTimeout(() => iframe.remove(), 30000);
}

async function saveOrShareImage(blob, filename) {
  // 1) Web Share API (Android 시스템 공유 시트 — 갤러리 저장 포함)
  if (navigator.canShare && navigator.share) {
    try {
      const file = new File([blob], filename, { type: "image/png" });
      if (navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: filename });
        showToast("공유됨");
        return;
      }
    } catch (e) {
      if (e && e.name === "AbortError") return; // 사용자 취소
      // 그 외 에러 → 폴백
    }
  }

  // 2) 데스크톱/모바일 브라우저: anchor 다운로드
  if (!isAndroidWebView()) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 30000);
    showToast("이미지 다운로드");
    return;
  }

  // 3) APK WebView 폴백: 미리보기 모달 — 길게 눌러 갤러리에 저장
  showImagePreview(blob, filename);
}

function showImagePreview(blob, filename) {
  const url = URL.createObjectURL(blob);
  const wrap = document.createElement("div");
  wrap.style.cssText =
    "position:fixed;inset:0;background:rgba(0,0,0,0.85);" +
    "display:flex;align-items:center;justify-content:center;" +
    "padding:16px;z-index:300;";
  wrap.innerHTML =
    '<div style="background:white;border-radius:12px;padding:16px;max-width:92vw;' +
    'max-height:92vh;display:flex;flex-direction:column;gap:12px;align-items:center;">' +
    '<div style="font-weight:600;color:#6F4E37;font-size:0.95rem;text-align:center;">' +
    '이미지를 길게 눌러 <span style="color:#D2691E;">갤러리에 저장</span>하세요' +
    '</div>' +
    '<img alt="' + escapeAttr(filename) + '" src="' + url + '" ' +
    'style="max-width:100%;max-height:70vh;border-radius:8px;display:block;' +
    '-webkit-touch-callout:default;user-select:none;">' +
    '<button type="button" class="btn btn-secondary" ' +
    'style="padding:10px 20px;border:none;border-radius:8px;' +
    'background:#f0ebe4;color:#6F4E37;font-weight:600;cursor:pointer;">닫기</button>' +
    '</div>';
  const close = () => { wrap.remove(); URL.revokeObjectURL(url); };
  wrap.querySelector("button").addEventListener("click", close);
  wrap.addEventListener("click", (e) => { if (e.target === wrap) close(); });
  document.body.appendChild(wrap);
}

// ---------- utils ----------
function showBanner(msg, type) {
  banner.className = "banner " + type;
  banner.textContent = msg;
  if (type === "success") setTimeout(() => { banner.className = "banner"; }, 3000);
}
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ---------- 앱 버전 (APK 전용 표시) ----------
(async function showAppVersion() {
  const ua = navigator.userAgent;
  if (!/Android.*wv\)|; wv\)/.test(ua)) return;
  // 설치된 APK 버전 (User-Agent에 빌드 시 주입)
  const m = ua.match(/CafeCoffeeApp\/([\d.]+)/);
  const installed = m ? m[1] : null;
  const el = document.getElementById("app-version");
  if (installed) {
    el.textContent = "v" + installed;
    el.classList.add("show");
  } else {
    // 구버전 APK (User-Agent 미주입)
    el.textContent = "v?";
    el.classList.add("show");
  }
})();

// ---------- init ----------
async function init() {
  try {
    const st = await api("GET", "/api/admin/status");
    if (!st.authenticated) { showPinModal(); return; }
    hidePinModal();
    await loadList();
  } catch (e) {
    showPinModal();
  }
}

init();
