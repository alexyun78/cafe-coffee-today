<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Insight — 92°C ROASTERY</title>
<meta name="description" content="매일 한 편씩 정리하는 커피 학술 인사이트. 92도씨가 직접 번역하고 큐레이션합니다.">
<link rel="icon" type="image/png" href="/static/img/logo-92black.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --canvas: #FFFFFF;
  --canvas-warm: #FAF7F2;
  --canvas-stone: #F2ECE3;
  --ink: #1A1410;
  --ink-mute: #4A3F36;
  --ink-soft: #6B5E52;
  --espresso: #6F4E37;
  --caramel: #C9986A;
  --copper: #B5703D;
  --line: #E8E0D5;
  --line-soft: #F0E9DD;
  --font-display: "Cormorant Garamond", "Pretendard", serif;
  --font-body: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --r-sm: 6px;
  --r-md: 12px;
  --r-pill: 999px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body); color: var(--ink); background: var(--canvas);
  font-feature-settings: "kern","ss01"; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; height: auto; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .container { padding: 0 20px; } }
@media (max-width: 480px) { .container { padding: 0 16px; } }

/* Top nav */
.site-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,255,255,0.9);
  backdrop-filter: saturate(140%) blur(14px);
  -webkit-backdrop-filter: saturate(140%) blur(14px);
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  max-width: 1200px; margin: 0 auto; padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand {
  font-family: var(--font-display); font-size: 1.5rem; font-weight: 700;
  color: var(--ink); display: inline-flex; align-items: center; gap: 4px;
}
.brand-mark {
  display: inline-flex; align-items: flex-start;
  font-family: "Pretendard", sans-serif; font-weight: 900;
  letter-spacing: -0.04em; line-height: 1; color: inherit;
}
.temp-mark { display: flex; flex-direction: column; line-height: .82; margin: 0 .05em 0 .04em; }
.temp-mark .temp-deg { font-size: .42em; letter-spacing: -.04em; }
.temp-mark .temp-c { font-size: .58em; letter-spacing: -.05em; margin-top: -.05em; }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-links a {
  font-size: .85rem; color: var(--ink-mute); font-weight: 500;
  letter-spacing: .04em; transition: color .2s;
}
.nav-links a:hover { color: var(--ink); }
.nav-links a.current { color: var(--copper); }
@media (max-width: 720px) {
  .nav-links { display: none; }
  .nav-inner { padding: 12px 18px; }
  .brand { font-size: 1.05rem; }
}

/* Hero */
.list-hero {
  padding: 80px 0 60px;
  background: var(--canvas-warm);
  border-bottom: 1px solid var(--line-soft);
}
.eyebrow {
  font-family: var(--font-mono); font-size: .72rem; letter-spacing: .28em;
  color: var(--copper); margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
}
.eyebrow::before { content: ""; display: inline-block; width: 28px; height: 1px; background: var(--copper); }
.list-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(2.2rem, 5vw, 3.6rem); line-height: 1.1;
  letter-spacing: -0.02em; color: var(--ink); margin-bottom: 18px;
}
.list-title em { font-style: italic; color: var(--espresso); font-weight: 600; }
.list-sub {
  font-size: 1.05rem; color: var(--ink-mute); line-height: 1.7;
  max-width: 580px;
}

/* List */
.list-section { padding: 60px 0 100px; }
.insight-list {
  display: grid; grid-template-columns: 1fr; gap: 24px;
}
@media (min-width: 720px) { .insight-list { grid-template-columns: repeat(2, 1fr); gap: 28px; } }
@media (min-width: 1080px) { .insight-list { grid-template-columns: repeat(3, 1fr); } }

.insight-card {
  display: flex; flex-direction: column;
  background: var(--canvas); border: 1px solid var(--line);
  border-radius: var(--r-md); overflow: hidden;
  transition: transform .2s, box-shadow .2s, border-color .2s;
  cursor: pointer;
}
.insight-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 36px rgba(111, 78, 55, 0.10);
  border-color: var(--caramel);
}
.insight-card-hero {
  aspect-ratio: 3 / 2; background: var(--canvas-warm);
  border-bottom: 1px solid var(--line);
  overflow: hidden;
}
.insight-card-hero img { width: 100%; height: 100%; object-fit: cover; }
.insight-card-body {
  padding: 22px 22px 24px;
  display: flex; flex-direction: column; gap: 12px;
  flex: 1;
}
.insight-card-meta {
  display: flex; gap: 12px; align-items: center;
  font-family: var(--font-mono); font-size: .7rem; letter-spacing: .12em;
  color: var(--ink-soft);
}
.insight-card-date { color: var(--copper); font-weight: 600; }
.insight-card-cat {
  padding: 4px 10px; background: var(--canvas-warm);
  border-radius: var(--r-pill); color: var(--ink-mute);
  font-size: .65rem;
}
.insight-card-title {
  font-family: var(--font-display); font-weight: 600;
  font-size: 1.3rem; line-height: 1.3; letter-spacing: -0.01em;
  color: var(--ink); margin-top: 2px;
}
.insight-card-one-liner {
  font-family: var(--font-display); font-style: italic;
  font-size: 1rem; line-height: 1.55; color: var(--espresso);
  margin-top: auto;
  padding-top: 10px; border-top: 1px solid var(--line-soft);
}

.empty-state {
  padding: 80px 40px; text-align: center;
  background: var(--canvas-warm); border: 1px solid var(--line);
  border-radius: var(--r-md);
  font-family: var(--font-display); font-style: italic;
  color: var(--ink-mute); font-size: 1.3rem;
}

.loading-skel {
  background: var(--canvas-warm); border: 1px solid var(--line);
  border-radius: var(--r-md); height: 380px;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* Footer */
.site-footer {
  padding: 36px 0; border-top: 1px solid var(--line-soft);
  font-family: var(--font-mono); font-size: .75rem; letter-spacing: .14em;
  color: var(--ink-soft); text-align: center;
}
.site-footer a { color: var(--ink-mute); border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
.site-footer a:hover { color: var(--copper); border-bottom-color: var(--copper); }
</style>
</head>
<body>

<header class="site-nav">
  <div class="nav-inner">
    <a class="brand" href="/">
      <span class="brand-mark">92<span class="temp-mark"><span class="temp-deg">°</span><span class="temp-c">C</span></span></span>ROASTERY
    </a>
    <nav class="nav-links">
      <a href="/#now">오늘의 커피</a>
      <a href="/#upcoming">곧 만날</a>
      <a href="/insight" class="current">인사이트</a>
      <a href="/#hours">영업</a>
    </nav>
  </div>
</header>

<section class="list-hero">
  <div class="container">
    <div class="eyebrow">— COFFEE INSIGHT</div>
    <h1 class="list-title">매일 한 편의 <em>커피 인사이트</em></h1>
    <p class="list-sub">전 세계에서 발표되는 커피 학술 논문을 매일 한 편씩 골라 한국어로 정리합니다. 생두부터 추출, 향미 화학, 건강까지 — 한 잔 뒤에 숨어 있는 과학을 짧고 깊게 읽어 보세요.</p>
  </div>
</section>

<section class="list-section">
  <div class="container">
    <div class="insight-list" id="insight-list">
      <div class="loading-skel"></div>
      <div class="loading-skel"></div>
      <div class="loading-skel"></div>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <a href="/">HOME</a>
    <span style="margin: 0 16px;">·</span>
    <span>BREWED AT 92°C</span>
  </div>
</footer>

<script>
(function () {
  'use strict';

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function fmtDate(s) {
    if (!s) return '';
    var m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!m) return s;
    return m[1] + '.' + m[2] + '.' + m[3];
  }

  function cardHtml(item) {
    var hero = item.hero_image || '/static/img/insights/hero/default.svg';
    var primary = (item.categories_primary || []).join(' · ');
    var second = (item.categories_secondary || []).slice(0, 2).join(' · ');
    var cats = [primary, second].filter(Boolean).join(' / ');
    return ''
      + '<a class="insight-card" href="/insight/' + encodeURIComponent(item.id) + '">'
      + '  <div class="insight-card-hero"><img src="' + hero + '" alt="' + escapeHtml(item.title_ko || '') + '" loading="lazy"></div>'
      + '  <div class="insight-card-body">'
      + '    <div class="insight-card-meta">'
      + '      <span class="insight-card-date">' + escapeHtml(fmtDate(item.date)) + '</span>'
      + (cats ? '      <span class="insight-card-cat">' + escapeHtml(cats) + '</span>' : '')
      + '    </div>'
      + '    <h2 class="insight-card-title">' + escapeHtml(item.title_ko || '') + '</h2>'
      + '    <p class="insight-card-one-liner">' + escapeHtml(item.one_liner || '') + '</p>'
      + '  </div>'
      + '</a>';
  }

  function render(items) {
    var root = document.getElementById('insight-list');
    if (!items || items.length === 0) {
      root.innerHTML = '<div class="empty-state">아직 인사이트가 없습니다. 매일 아침 한 편씩 추가될 예정입니다.</div>';
      return;
    }
    root.innerHTML = items.map(cardHtml).join('');
  }

  fetch('/api/insights')
    .then(function (r) { return r.json(); })
    .then(function (j) {
      if (j && j.success && Array.isArray(j.items)) render(j.items);
      else render([]);
    })
    .catch(function () {
      document.getElementById('insight-list').innerHTML = '<div class="empty-state">목록을 불러오지 못했습니다.</div>';
    });
})();
</script>

</body>
</html>
