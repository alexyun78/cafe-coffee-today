<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="원산지">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/><stop offset="100%" stop-color="#F2ECE3"/>
    </linearGradient>
    <radialGradient id="globe" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0%" stop-color="#E7D6BC"/><stop offset="100%" stop-color="#C9986A"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <g transform="translate(255 200)">
    <circle r="120" fill="url(#globe)" stroke="#6F4E37" stroke-width="3"/>
    <!-- landmasses -->
    <g fill="#8C6A47" opacity="0.85">
      <path d="M-70 -60 q30 -20 60 0 q15 25 -10 40 q-40 10 -55 -15 z"/>
      <path d="M10 10 q40 -10 60 20 q5 35 -35 40 q-40 -5 -35 -40 z"/>
      <path d="M-80 30 q25 -5 30 25 q-15 25 -40 10 q-10 -25 10 -35 z"/>
    </g>
    <!-- coffee belt -->
    <path d="M-118 -22 q118 50 236 0" fill="none" stroke="#B5703D" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.9"/>
    <path d="M-118 22 q118 -50 236 0" fill="none" stroke="#B5703D" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.9"/>
    <ellipse rx="120" ry="120" fill="none" stroke="#fff" stroke-width="2" opacity="0.25"/>
  </g>
  <!-- location pin with cherry -->
  <g transform="translate(430 95)">
    <path d="M0 70 C -34 30, -34 0, 0 0 C 34 0, 34 30, 0 70 Z" fill="#B5703D" stroke="#6F4E37" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="0" cy="22" r="15" fill="#C0392B" stroke="#6F4E37" stroke-width="2.5"/>
    <path d="M0 7 q4 -8 10 -9" fill="none" stroke="#5A8A3C" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="40" y="370" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="6" fill="#6B5E52">— ORIGIN · TERROIR</text>
  <text x="560" y="50" text-anchor="end" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="22" fill="#6F4E37">원산지 이야기</text>
</svg>
