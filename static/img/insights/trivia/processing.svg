<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="프로세싱">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/><stop offset="100%" stop-color="#F2ECE3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- sun -->
  <g transform="translate(470 110)">
    <circle r="42" fill="#E8B85C" stroke="#B5703D" stroke-width="3"/>
    <g stroke="#C9986A" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-58" x2="0" y2="-72"/><line x1="41" y1="-41" x2="51" y2="-51"/>
      <line x1="58" y1="0" x2="72" y2="0"/><line x1="-41" y1="-41" x2="-51" y2="-51"/>
      <line x1="-58" y1="0" x2="-72" y2="0"/>
    </g>
  </g>
  <!-- raised drying bed -->
  <g transform="translate(120 210)">
    <path d="M0 60 L 320 60 L 360 110 L 40 110 Z" fill="#E7D6BC" stroke="#6F4E37" stroke-width="3" stroke-linejoin="round"/>
    <g stroke="#C9986A" stroke-width="1.6" opacity="0.7">
      <line x1="20" y1="72" x2="340" y2="72"/><line x1="14" y1="86" x2="346" y2="86"/><line x1="8" y1="100" x2="352" y2="100"/>
    </g>
    <!-- legs -->
    <line x1="20" y1="110" x2="20" y2="150" stroke="#6F4E37" stroke-width="4"/>
    <line x1="320" y1="110" x2="320" y2="150" stroke="#6F4E37" stroke-width="4"/>
    <!-- drying cherries -->
    <g stroke="#6F4E37" stroke-width="1.5">
      <circle cx="60" cy="58" r="11" fill="#C0392B"/><circle cx="110" cy="52" r="11" fill="#D35400"/>
      <circle cx="160" cy="58" r="11" fill="#C0392B"/><circle cx="210" cy="52" r="11" fill="#E8B85C"/>
      <circle cx="260" cy="58" r="11" fill="#D35400"/><circle cx="135" cy="70" r="11" fill="#C0392B"/>
      <circle cx="185" cy="70" r="11" fill="#D35400"/><circle cx="235" cy="70" r="11" fill="#C0392B"/>
    </g>
  </g>
  <text x="40" y="370" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="6" fill="#6B5E52">— PROCESSING</text>
  <text x="560" y="50" text-anchor="end" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="22" fill="#6F4E37">가공 방식</text>
</svg>
