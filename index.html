<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 커피</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 3rem;
            color: #6F4E37;
            margin-bottom: 10px;
            font-weight: 700;
            line-height: 1.2;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #6F5B3E;
        }

        /* 오늘의 커피 섹션 */
        .today-section {
            margin-bottom: 50px;
        }

        .today-section h2 {
            font-size: 2rem;
            color: #6F4E37;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #D2691E;
            line-height: 1.25;
        }

        .coffee-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .coffee-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .coffee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .coffee-card-title {
            font-size: 1.5rem;
            color: #6F4E37;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .coffee-detail {
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .coffee-detail:last-child {
            border-bottom: none;
        }

        .coffee-detail-label {
            font-weight: 600;
            color: #8B7355;
            display: inline-block;
            min-width: 80px;
        }

        .coffee-detail-value {
            color: #333;
        }

        .process-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .badge-washed { background: #E3F2FD; color: #1976D2; }
        .badge-natural { background: #FFF3E0; color: #E65100; }
        .badge-anaerobic { background: #F3E5F5; color: #7B1FA2; }
        .badge-sugarcane { background: #FFF9C4; color: #F57F17; }
        .badge-진행중 { background: #E8F5E9; color: #2E7D32; }
        .badge-완료 { background: #E0E0E0; color: #616161; }
        .badge-시작전 { background: #FFF3E0; color: #EF6C00; }
        .badge-예정 { background: #E1F5FE; color: #0277BD; }

        /* 히스토리 섹션 */
        .history-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .history-section h2 {
            font-size: 2rem;
            color: #6F4E37;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #D2691E;
        }

        /* 데스크톱용 테이블 */
        .desktop-table {
            display: block;
        }

        .mobile-cards {
            display: none;
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: #6F4E37;
            color: white;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .table-coffee-name {
            font-weight: 600;
            color: #6F4E37;
        }

        /* 모바일용 카드 레이아웃 */
        .history-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #D2691E;
        }

        .history-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #6F4E37;
            margin-bottom: 10px;
        }

        .history-card-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .history-card-label {
            font-weight: 600;
            color: #8B7355;
        }

        .history-card-value {
            color: #333;
            text-align: right;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1rem;
        }

        /* 모달 팝업 스타일 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #6F4E37 0%, #8B6F47 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-button {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
        }

        .modal-detail {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-detail:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .modal-detail-label {
            font-weight: 600;
            color: #6F4E37;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .modal-detail-value {
            color: #333;
            font-size: 1rem;
            line-height: 1.6;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover {
            background: #f0f0f0;
        }

        .history-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-card:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #8B7355;
        }

        .error {
            background: #FFEBEE;
            color: #C62828;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .date-display {
            font-size: 0.9rem;
            color: #666;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px 15px;
                margin-bottom: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header .subtitle {
                font-size: 0.95rem;
            }

            .today-section {
                margin-bottom: 30px;
            }

            .today-section h2,
            .history-section h2 {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }

            .coffee-cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .coffee-card {
                padding: 20px;
            }

            .coffee-card-title {
                font-size: 1.3rem;
            }

            .history-section {
                padding: 20px 15px;
            }

            /* 모바일에서 테이블 숨기고 카드 표시 */
            .desktop-table {
                display: none;
            }

            .mobile-cards {
                display: block;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .coffee-card {
                transition: none;
            }
            .coffee-card:hover {
                transform: none;
            }
            .modal {
                animation: none;
            }
            .modal-content {
                animation: none;
            }
            .history-card {
                transition: none;
            }
            .history-card:hover {
                transform: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .header .subtitle {
                font-size: 0.85rem;
            }

            .today-section h2,
            .history-section h2 {
                font-size: 1.3rem;
                padding-left: 8px;
                border-left: 4px solid #D2691E;
            }

            .coffee-card {
                padding: 15px;
            }

            .coffee-card-title {
                font-size: 1.1rem;
            }

            .coffee-detail-label {
                min-width: 70px;
                font-size: 0.9rem;
            }

            .history-section {
                padding: 15px 12px;
            }

            .history-card {
                padding: 12px;
            }

            .history-card-title {
                font-size: 1rem;
            }

            .history-card-row {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>오늘의 커피</h1>
            <p class="subtitle">매일 다른 92도씨 로스터리 커피를 만나보세요</p>
        </div>

        <div id="content">
            <div class="loading">커피 정보를 불러오는 중...</div>
        </div>
    </div>

    <!-- 커피 상세 모달 -->
    <div id="coffeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-button" onclick="closeCoffeeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        async function loadCoffeeData() {
            try {
                const response = await fetch('/api/coffee');
                
                if (!response.ok) {
                    throw new Error(`서버 응답 오류: ${response.status}`);
                }
                
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '데이터를 불러오는데 실패했습니다.');
                }

                renderContent(data);
            } catch (error) {
                console.error('Error:', error);
                
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <div class="error-title">⚠️ 서버 연결 오류</div>
                        <p style="margin: 15px 0;">서버에 연결할 수 없습니다.</p>
                        <button onclick="location.reload()" style="
                            margin-top: 20px;
                            padding: 12px 30px;
                            background: #6F4E37;
                            color: white;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            cursor: pointer;
                        ">🔄 다시 시도</button>
                    </div>
                `;
            }
        }

        function formatDate(dateObj) {
            if (!dateObj) return '-';
            
            const start = dateObj.start;
            const end = dateObj.end;
            
            if (!start) return '-';
            
            const startDate = new Date(start);
            const startStr = `${startDate.getFullYear()}년 ${startDate.getMonth() + 1}월 ${startDate.getDate()}일`;
            
            if (end) {
                const endDate = new Date(end);
                const endStr = `${endDate.getFullYear()}년 ${endDate.getMonth() + 1}월 ${endDate.getDate()}일`;
                return `${startStr} ~ ${endStr}`;
            }
            
            return startStr;
        }

        function formatDateShort(dateObj) {
            if (!dateObj) return '-';
            const start = dateObj.start;
            const end = dateObj.end;
            
            if (!start) return '-';
            
            const startDate = new Date(start);
            const startStr = `${startDate.getMonth() + 1}/${startDate.getDate()}`;
            
            if (end) {
                const endDate = new Date(end);
                const endStr = `${endDate.getMonth() + 1}/${endDate.getDate()}`;
                return `${startStr} ~ ${endStr}`;
            }
            
            return startStr;
        }

        function getProcessBadgeClass(process) {
            if (!process) return '';
            const processLower = process.toLowerCase();
            if (processLower.includes('워시드') || processLower.includes('washed')) return 'badge-washed';
            if (processLower.includes('내추럴') || processLower.includes('natural')) return 'badge-natural';
            if (processLower.includes('무산소') || processLower.includes('anaerobic')) return 'badge-anaerobic';
            if (processLower.includes('사탕수수') || processLower.includes('sugar')) return 'badge-sugarcane';
            return 'badge-washed';
        }

        function getStatusBadgeClass(status) {
            if (!status) return '';
            if (status === '진행 중') return 'badge-진행중';
            if (status === '완료') return 'badge-완료';
            if (status === '시작 전') return 'badge-시작전';
            if (status === '예정') return 'badge-예정';
            return '';
        }

        // 모달 팝업 관련 함수
        function openCoffeeModal(coffee) {
            const modal = document.getElementById('coffeeModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            // 모달 제목
            modalTitle.textContent = coffee.커피 || '제목 없음';

            // 모달 내용
            let bodyHtml = '';

            if (coffee.프로세싱) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">프로세싱</span>
                        <div class="modal-detail-value">
                            <span class="process-badge ${getProcessBadgeClass(coffee.프로세싱)}">
                                ${coffee.프로세싱}
                            </span>
                        </div>
                    </div>
                `;
            }

            if (coffee.상태) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">상태</span>
                        <div class="modal-detail-value">
                            <span class="process-badge ${getStatusBadgeClass(coffee.상태)}">
                                ${coffee.상태}
                            </span>
                        </div>
                    </div>
                `;
            }

            if (coffee.로스팅) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">로스팅</span>
                        <div class="modal-detail-value date-display">${formatDate(coffee.로스팅)}</div>
                    </div>
                `;
            }

            if (coffee.제공일) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">제공일</span>
                        <div class="modal-detail-value date-display">${formatDate(coffee.제공일)}</div>
                    </div>
                `;
            }

            if (coffee.컵노트) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">컵노트</span>
                        <div class="modal-detail-value">${coffee.컵노트}</div>
                    </div>
                `;
            }

            if (coffee.감상) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">감상</span>
                        <div class="modal-detail-value">${coffee.감상}</div>
                    </div>
                `;
            }

            modalBody.innerHTML = bodyHtml;
            modal.style.display = 'block';
        }

        function closeCoffeeModal() {
            const modal = document.getElementById('coffeeModal');
            modal.style.display = 'none';
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('coffeeModal');
            if (event.target === modal) {
                closeCoffeeModal();
            }
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeCoffeeModal();
            }
        });

        function renderContent(data) {
            const { today, history } = data;
            
            let html = '';

            // 오늘의 커피 섹션
            if (today && today.length > 0) {
                html += `
                    <div class="today-section">
                        <h2>지금 제공 중인 커피</h2>
                        <div class="coffee-cards">
                            ${today.map(coffee => renderCoffeeCard(coffee)).join('')}
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div class="today-section">
                        <h2>지금 제공 중인 커피</h2>
                        <div class="empty-message">
                            <div style="font-size: 2.5rem; margin-bottom: 12px;">☕</div>
                            <div style="color: #6F4E37; font-weight: 500;">준비 중입니다</div>
                            <div style="color: #8B7355; font-size: 0.95rem; margin-top: 6px;">곧 새로운 커피가 제공될 예정이에요</div>
                        </div>
                    </div>
                `;
            }

            // 히스토리 섹션
            html += `
                <div class="history-section">
                    <h2>커피 히스토리</h2>
                    ${renderHistory(history)}
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        function renderCoffeeCard(coffee) {
            return `
                <div class="coffee-card">
                    <div class="coffee-card-title">${coffee.커피 || '제목 없음'}</div>
                    
                    ${coffee.프로세싱 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">프로세싱</span>
                            <span class="process-badge ${getProcessBadgeClass(coffee.프로세싱)}">
                                ${coffee.프로세싱}
                            </span>
                        </div>
                    ` : ''}
                    
                    ${coffee.로스터리 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">로스터리</span>
                            <span class="coffee-detail-value">${coffee.로스터리}</span>
                        </div>
                    ` : ''}
                    
                    ${coffee.로스팅 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">로스팅</span>
                            <span class="coffee-detail-value date-display">${formatDate(coffee.로스팅)}</span>
                        </div>
                    ` : ''}
                    
                    ${coffee.제공일 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">제공일</span>
                            <span class="coffee-detail-value date-display">${formatDate(coffee.제공일)}</span>
                        </div>
                    ` : ''}
                    
                    ${coffee.컵노트 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">컵노트</span>
                            <div class="coffee-detail-value" style="margin-top: 5px;">${coffee.컵노트}</div>
                        </div>
                    ` : ''}
                    
                    ${coffee.감상 ? `
                        <div class="coffee-detail">
                            <span class="coffee-detail-label">감상</span>
                            <div class="coffee-detail-value" style="margin-top: 5px;">${coffee.감상}</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function renderHistory(history) {
            if (!history || history.length === 0) {
                return '<div class="empty-message">아직 커피 히스토리가 없습니다.</div>';
            }

            // 히스토리 데이터를 전역으로 저장
            window.coffeeHistory = history;

            // 데스크톱 테이블
            const desktopTable = `
                <div class="desktop-table">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>커피</th>
                                    <th>프로세싱</th>
                                    <th>상태</th>
                                    <th>컵노트</th>
                                    <th>로스팅</th>
                                    <th>제공일</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${history.map((coffee, index) => `
                                    <tr onclick="openCoffeeModal(window.coffeeHistory[${index}])">
                                        <td class="table-coffee-name">${coffee.커피 || '-'}</td>
                                        <td>
                                            ${coffee.프로세싱 ? `
                                                <span class="process-badge ${getProcessBadgeClass(coffee.프로세싱)}">
                                                    ${coffee.프로세싱}
                                                </span>
                                            ` : '-'}
                                        </td>
                                        <td>
                                            ${coffee.상태 ? `
                                                <span class="process-badge ${getStatusBadgeClass(coffee.상태)}">
                                                    ${coffee.상태}
                                                </span>
                                            ` : '-'}
                                        </td>
                                        <td>${coffee.컵노트 || '-'}</td>
                                        <td class="date-display">${formatDateShort(coffee.로스팅)}</td>
                                        <td class="date-display">${formatDateShort(coffee.제공일)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            // 모바일 카드
            const mobileCards = `
                <div class="mobile-cards">
                    ${history.map((coffee, index) => `
                        <div class="history-card" onclick="openCoffeeModal(window.coffeeHistory[${index}])">
                            <div class="history-card-title">${coffee.커피 || '제목 없음'}</div>
                            ${coffee.프로세싱 ? `
                                <div class="history-card-row">
                                    <span class="history-card-label">프로세싱</span>
                                    <span class="process-badge ${getProcessBadgeClass(coffee.프로세싱)}">
                                        ${coffee.프로세싱}
                                    </span>
                                </div>
                            ` : ''}
                            ${coffee.상태 ? `
                                <div class="history-card-row">
                                    <span class="history-card-label">상태</span>
                                    <span class="process-badge ${getStatusBadgeClass(coffee.상태)}">
                                        ${coffee.상태}
                                    </span>
                                </div>
                            ` : ''}
                            ${coffee.컵노트 ? `
                                <div class="history-card-row">
                                    <span class="history-card-label">컵노트</span>
                                    <span class="history-card-value">${coffee.컵노트}</span>
                                </div>
                            ` : ''}
                            ${coffee.로스팅 ? `
                                <div class="history-card-row">
                                    <span class="history-card-label">로스팅</span>
                                    <span class="history-card-value date-display">${formatDate(coffee.로스팅)}</span>
                                </div>
                            ` : ''}
                            ${coffee.제공일 ? `
                                <div class="history-card-row">
                                    <span class="history-card-label">제공일</span>
                                    <span class="history-card-value date-display">${formatDate(coffee.제공일)}</span>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;

            return desktopTable + mobileCards;
        }

        // 페이지 로드 시 데이터 가져오기
        loadCoffeeData();
        
        // 5분마다 자동 새로고침
        setInterval(loadCoffeeData, 5 * 60 * 1000);
    </script>
</body>
</html>
