<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 커피</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header h1 {
            font-size: 3rem;
            color: #6F4E37;
            margin-bottom: 10px;
            font-weight: 700;
            line-height: 1.2;
        }

        .header .subtitle {
            font-size: 1.1rem;
            color: #6F5B3E;
        }

        /* 오늘의 커피 섹션 — 히어로 */
        .today-section {
            margin-bottom: 50px;
        }

        .today-section h2 {
            font-size: 2rem;
            color: #6F4E37;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #D2691E;
            line-height: 1.25;
        }

        .coffee-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .coffee-card {
            background: linear-gradient(145deg, #6F4E37 0%, #8B6F47 40%, #A0845C 100%);
            border-radius: 20px;
            padding: 32px 28px;
            color: white;
            box-shadow: 0 8px 32px rgba(111, 78, 55, 0.35);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .coffee-card::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }

        .coffee-card::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }

        .coffee-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(111, 78, 55, 0.45);
        }

        .coffee-card .serving-label {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .coffee-card-title {
            font-size: 1.7rem;
            color: white;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.3;
            position: relative;
        }

        .coffee-detail {
            margin-bottom: 8px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            position: relative;
        }

        .coffee-detail:last-child {
            border-bottom: none;
        }

        .coffee-card .coffee-detail-label {
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            display: inline-block;
            min-width: 80px;
            font-size: 0.85rem;
        }

        .coffee-card .coffee-detail-value {
            color: rgba(255,255,255,0.95);
        }

        .coffee-card .cup-notes-highlight {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .coffee-card .cup-notes-highlight .coffee-detail-label {
            display: block;
            margin-bottom: 6px;
        }

        .coffee-card .cup-notes-highlight .coffee-detail-value {
            color: white;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .coffee-card .comment-highlight {
            margin-top: 12px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .coffee-card .comment-highlight .coffee-detail-label {
            display: block;
            margin-bottom: 6px;
        }

        .coffee-card .comment-highlight .coffee-detail-value {
            color: rgba(255,255,255,0.95);
            font-size: 0.95rem;
            line-height: 1.6;
            font-style: italic;
        }

        .coffee-card .process-badge {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* 히스토리용 디테일 (기본값) */
        .coffee-detail-label {
            font-weight: 600;
            color: #8B7355;
            display: inline-block;
            min-width: 80px;
        }

        .coffee-detail-value {
            color: #333;
        }

        .process-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .badge-washed { background: #E3F2FD; color: #1976D2; }
        .badge-natural { background: #FFF3E0; color: #E65100; }
        .badge-anaerobic { background: #F3E5F5; color: #7B1FA2; }
        .badge-sugarcane { background: #FFF9C4; color: #F57F17; }
        .badge-진행중 { background: #E8F5E9; color: #2E7D32; }
        .badge-완료 { background: #E0E0E0; color: #616161; }
        .badge-시작전 { background: #FFF3E0; color: #EF6C00; }
        .badge-예정 { background: #E1F5FE; color: #0277BD; }

        /* 히스토리 섹션 */
        .history-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .history-section h2 {
            font-size: 2rem;
            color: #6F4E37;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid #D2691E;
        }

        /* 히스토리 헤더 (제목 + 뷰 토글) */
        .history-section-header {
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
        }
        .history-section-header h2 { margin-bottom: 0; }
        .view-toggle {
            display: inline-flex; border: 1.5px solid #e5ddd3;
            border-radius: 10px; overflow: hidden; background: white;
        }
        .view-toggle button {
            padding: 10px 16px; border: none; background: transparent;
            font-size: 0.92rem; cursor: pointer; color: #8B7355;
            font-weight: 600; font-family: inherit; min-height: 40px;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .view-toggle button.active {
            background: #6F4E37; color: white;
        }
        .view-toggle button + button { border-left: 1.5px solid #e5ddd3; }
        .view-toggle button.active + button,
        .view-toggle button.active { border-left-color: #6F4E37; }

        /* 달력 (히스토리) */
        .hcal-month-nav {
            display: flex; justify-content: center; align-items: center;
            gap: 12px; margin-bottom: 16px;
        }
        .hcal-month-nav h3 {
            color: #6F4E37; font-size: 1.3rem; font-weight: 700;
            min-width: 160px; text-align: center;
        }
        .hcal-month-nav button {
            background: #6F4E37; color: white; border: none;
            width: 40px; height: 40px; border-radius: 8px;
            font-size: 1.3rem; cursor: pointer; line-height: 1;
        }
        .hcal-month-nav button:hover { background: #8B6F47; }
        .hcal-today-btn {
            background: #f0ebe4 !important; color: #6F4E37 !important;
            width: auto !important; padding: 0 14px;
            font-size: 0.85rem !important; font-weight: 600;
        }

        .history-calendar {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
        }
        .hcal-day-header {
            text-align: center; font-weight: 700; padding: 8px 0;
            font-size: 0.92rem; color: #6F4E37;
        }
        .hcal-day-header.sun { color: #c62828; }
        .hcal-day-header.sat { color: #1565c0; }

        .hcal-cell {
            min-height: 130px; padding: 6px;
            background: #faf8f5; border-radius: 6px;
            display: flex; flex-direction: column; gap: 4px;
            overflow: hidden; border: 1px solid transparent;
        }
        .hcal-cell-out { background: #f0ede8; opacity: 0.55; }
        .hcal-cell-today { border-color: #D2691E; background: #fff8f0; }
        .hcal-date {
            font-size: 0.85rem; color: #8a7f78; font-weight: 600;
            padding: 2px 4px;
        }
        .hcal-date.sun { color: #c62828; }
        .hcal-date.sat { color: #1565c0; }
        .hcal-date-today {
            background: #D2691E; color: white !important;
            border-radius: 12px; padding: 2px 10px; align-self: flex-start;
        }

        .hcal-coffees {
            display: flex; flex-direction: column; gap: 4px;
            flex: 1; overflow: hidden;
        }
        .hcal-coffee {
            padding: 6px 8px; border-radius: 5px;
            border-left: 4px solid transparent;
            cursor: pointer;
        }
        .hcal-coffee-name {
            font-weight: 700; font-size: 0.95rem; line-height: 1.3;
            overflow: hidden; text-overflow: ellipsis; word-break: keep-all;
        }
        .hcal-coffee-roast {
            font-size: 0.72rem; margin-top: 2px; opacity: 0.85;
        }
        /* 상태별 색상 */
        .hcal-coffee-예정     { background: #E1F5FE; border-left-color: #0277BD; color: #01579B; }
        .hcal-coffee-진행중   { background: #E8F5E9; border-left-color: #2E7D32; color: #1B5E20; }
        .hcal-coffee-완료     { background: #ECECEC; border-left-color: #757575; color: #424242; }

        @media (max-width: 720px) {
            .hcal-cell { min-height: 88px; padding: 3px; gap: 2px; }
            .hcal-coffee { padding: 4px 5px; }
            .hcal-coffee-name { font-size: 0.75rem; }
            .hcal-coffee-roast { font-size: 0.62rem; }
            .hcal-date { font-size: 0.72rem; padding: 1px 3px; }
            .hcal-day-header { font-size: 0.78rem; padding: 4px 0; }
            .hcal-month-nav h3 { font-size: 1.05rem; min-width: 120px; }
            .hcal-month-nav button { width: 34px; height: 34px; font-size: 1.1rem; }
            .view-toggle button { padding: 8px 12px; font-size: 0.85rem; }
        }

        /* 데스크톱용 테이블 */
        .desktop-table {
            display: block;
        }

        .mobile-cards {
            display: none;
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        thead {
            background: #6F4E37;
            color: white;
        }

        th {
            padding: 15px 10px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .table-coffee-name {
            font-weight: 600;
            color: #6F4E37;
        }

        /* 모바일용 카드 레이아웃 */
        .history-card {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #D2691E;
        }

        .history-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #6F4E37;
            margin-bottom: 10px;
        }

        .history-card-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.9rem;
        }

        .history-card-label {
            font-weight: 600;
            color: #8B7355;
        }

        .history-card-value {
            color: #333;
            text-align: right;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1rem;
        }

        /* PIN 모달 (APK 히든 진입) */
        .pin-modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            padding: 16px; z-index: 2000;
        }
        .pin-modal-backdrop.hidden { display: none; }
        .pin-modal {
            background: white; border-radius: 16px;
            padding: 28px 24px; max-width: 320px; width: 100%;
            text-align: center;
        }
        .pin-modal h2 { color: #6F4E37; font-size: 1.2rem; margin-bottom: 8px; }
        .pin-modal p { color: #8a7f78; font-size: 0.9rem; margin-bottom: 16px; }
        .pin-modal input {
            width: 100%; padding: 12px; border: 1.5px solid #e5ddd3;
            border-radius: 8px; font-size: 1.3rem; font-weight: 600;
            text-align: center; letter-spacing: 4px;
            font-family: inherit;
        }
        .pin-modal input:focus {
            outline: none; border-color: #D2691E;
            box-shadow: 0 0 0 3px rgba(210,105,30,0.15);
        }
        .pin-modal-error {
            color: #c62828; font-size: 0.85rem; margin-top: 8px; display: none;
        }
        .pin-modal-btn {
            margin-top: 16px; width: 100%; padding: 14px;
            background: #6F4E37; color: white; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 600;
            cursor: pointer; font-family: inherit;
        }
        .pin-modal-btn:hover { background: #8B6F47; }
        .pin-modal-actions { display: flex; gap: 10px; margin-top: 16px; }
        .pin-modal-actions .pin-modal-btn { margin-top: 0; flex: 1; }
        .pin-modal-btn.secondary { background: #f0ebe4; color: #6F4E37; }
        .pin-modal-btn.secondary:hover { background: #e6ddd0; }

        /* 모달 팝업 스타일 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #6F4E37 0%, #8B6F47 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-button {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
        }

        .modal-detail {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .modal-detail:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .modal-detail-label {
            font-weight: 600;
            color: #6F4E37;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: block;
        }

        .modal-detail-value {
            color: #333;
            font-size: 1rem;
            line-height: 1.6;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover {
            background: #f0f0f0;
        }

        .history-card {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .history-card:hover {
            background: #e8e8e8;
            transform: translateX(5px);
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: #8B7355;
        }

        .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #e0d5c8;
            border-top-color: #6F4E37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #FFEBEE;
            color: #C62828;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .date-display {
            font-size: 0.9rem;
            color: #666;
        }

        /* ========== 탭 네비게이션 ========== */
        .tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            padding: 6px;
            background: linear-gradient(135deg, #2c1810 0%, #3d2518 100%);
            border-radius: 18px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.18), inset 0 1px 2px rgba(0,0,0,0.3);
        }
        .tab-btn {
            flex: 1;
            padding: 14px 18px;
            border: none;
            background: transparent;
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            cursor: pointer;
            transition: color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.2s;
            font-family: inherit;
            position: relative;
            border-radius: 13px;
            overflow: hidden;
            letter-spacing: 0.3px;
        }
        .tab-btn:not(.active):hover {
            color: rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.05);
        }
        .tab-btn:active { transform: scale(0.97); }

        /* 오늘의 커피 탭 (활성) — 따뜻한 에스프레소 → 캐러멜 그라디언트 */
        .tab-btn[data-tab="coffee"].active {
            color: #fff;
            background: linear-gradient(135deg, #6F4E37 0%, #C9732B 45%, #F4A460 100%);
            box-shadow:
              0 6px 20px rgba(201,115,43,0.55),
              inset 0 1px 0 rgba(255,255,255,0.35),
              inset 0 -2px 4px rgba(78,48,28,0.35);
            text-shadow: 0 1px 3px rgba(60,30,10,0.5);
        }
        .tab-btn[data-tab="coffee"].active::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 0%, rgba(255,255,255,0.35) 0%, transparent 50%);
            pointer-events: none;
        }

        /* 누가쏠까 탭 (활성) — 브라스(황동) 금속 질감 + shimmer */
        .tab-btn[data-tab="game"].active {
            color: #3d2518;
            background: linear-gradient(100deg,
              #8B6914 0%, #B8860B 18%, #DAA520 32%,
              #FFD700 45%, #FFF4B0 50%, #FFD700 55%,
              #DAA520 68%, #B8860B 82%, #8B6914 100%);
            background-size: 250% 100%;
            animation: brassShimmer 3.2s linear infinite;
            box-shadow:
              0 6px 22px rgba(218,165,32,0.6),
              inset 0 1px 0 rgba(255,255,255,0.55),
              inset 0 -2px 4px rgba(139,105,20,0.5);
            text-shadow: 0 1px 1px rgba(255,248,180,0.7), 0 -1px 0 rgba(139,105,20,0.25);
        }
        @keyframes brassShimmer {
            0%   { background-position: 0%   50%; }
            100% { background-position: 250% 50%; }
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ========== 누가쏠까 — 모드 선택 ========== */
        .game-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            padding: 20px;
        }
        .game-card {
            flex: 1;
            max-width: 220px;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #6F4E37 0%, #8B6F47 40%, #A0845C 100%);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(111,78,55,0.35);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
        }
        .game-card:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(111,78,55,0.45); }
        .game-card:active { transform: scale(0.96); }
        .game-card-icon { font-size: 3.5rem; }
        .game-card-label { font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }

        /* ========== 손가락 게임 ========== */
        .finger-game {
            position: fixed; inset: 0; z-index: 3000;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: none; flex-direction: column;
            touch-action: none; user-select: none;
            -webkit-user-select: none;
        }
        .finger-game.active { display: flex; }
        .finger-game-header {
            position: relative;
            padding: 28px 64px 22px;
            color: white;
        }
        .finger-game-status {
            font-size: 2.4rem;
            font-weight: 900;
            color: white;
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.1;
            text-shadow: 0 2px 16px rgba(0,0,0,0.35);
            transition: color 0.2s;
        }
        .finger-game-status.countdown {
            font-size: 6.5rem;
            color: #FFD700;
            animation: countdownPulse 0.5s ease-out;
        }
        .finger-game-status.winner {
            font-size: 2.8rem;
            color: #FFD700;
        }
        @keyframes countdownPulse {
            0% { transform: scale(1.6); opacity: 0.3; }
            100% { transform: scale(1); opacity: 1; }
        }
        .finger-game-close {
            position: absolute; top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%; border: none;
            background: rgba(255,255,255,0.15); color: white;
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .finger-game-area {
            flex: 1; position: relative; overflow: hidden;
        }
        .touch-circle {
            position: absolute; width: 110px; height: 110px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: touchPulse 1.5s ease-in-out infinite;
            transition: width 0.4s, height 0.4s, opacity 0.4s;
            pointer-events: none;
        }
        .touch-label {
            position: absolute;
            left: 50%;
            bottom: 100%;
            transform: translateX(-50%);
            margin-bottom: 10px;
            color: white;
            font-weight: 900;
            font-size: 1.35rem;
            text-shadow: 0 2px 6px rgba(0,0,0,0.85), 0 0 12px rgba(0,0,0,0.5);
            pointer-events: none;
            white-space: nowrap;
            transition: font-size 0.4s, margin-bottom 0.4s;
        }
        .touch-circle.loser {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0.3) !important;
        }
        .touch-circle.winner {
            animation: winnerGlow 0.6s ease-in-out infinite alternate !important;
            width: 280px !important; height: 280px !important;
            z-index: 10;
        }
        .touch-circle.winner .touch-label {
            font-size: 2.8rem;
            margin-bottom: 18px;
        }
        @keyframes touchPulse {
            0%, 100% { box-shadow: 0 0 0 0 currentColor; }
            50% { box-shadow: 0 0 20px 8px currentColor; }
        }
        @keyframes winnerGlow {
            from { box-shadow: 0 0 30px 10px currentColor; transform: translate(-50%,-50%) scale(1); }
            to { box-shadow: 0 0 60px 24px currentColor; transform: translate(-50%,-50%) scale(1.08); }
        }

        /* ========== 룰렛 게임 ========== */
        .roulette-game {
            position: fixed; inset: 0; z-index: 3000;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: none; flex-direction: column; align-items: center;
            overflow-y: auto;
        }
        .roulette-game.active { display: flex; }
        .roulette-game-header {
            width: 100%; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            color: white;
        }
        .roulette-game-title { font-size: 1.1rem; font-weight: 600; }
        .roulette-game-close {
            width: 36px; height: 36px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.15); color: white;
            font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        /* Phase 1: 인원 설정 */
        .roulette-setup {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 30px;
            color: white;
        }
        .roulette-count-row {
            display: flex; align-items: center; gap: 24px;
        }
        .roulette-count-btn {
            width: 56px; height: 56px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: white; font-size: 1.8rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .roulette-count-btn:hover { background: rgba(255,255,255,0.2); }
        .roulette-count-btn:active { transform: scale(0.9); }
        .roulette-count-num {
            font-size: 5rem; font-weight: 900; min-width: 80px; text-align: center;
        }
        .roulette-start-btn {
            padding: 18px 60px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, #FF8C00, #FF6B00);
            color: white; font-size: 1.3rem; font-weight: 700;
            cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 6px 25px rgba(255,140,0,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        .roulette-start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,140,0,0.5); }
        .roulette-start-btn:active { transform: scale(0.96); }
        /* Phase 2: 카드 선택 */
        .roulette-cards-phase {
            flex: 1; display: none; flex-direction: column;
            align-items: center; padding: 20px; width: 100%;
        }
        .roulette-cards-phase.active { display: flex; }
        .roulette-instruction {
            color: rgba(255,255,255,0.8); font-size: 1rem;
            margin-bottom: 24px; text-align: center;
        }
        .roulette-cards-grid {
            display: flex; flex-wrap: wrap; gap: 28px;
            justify-content: center; max-width: 100%;
            padding: 10px;
        }
        .roulette-card {
            width: 256px; height: 352px;
            border-radius: 24px; cursor: pointer;
            perspective: 1200px; position: relative;
            touch-action: manipulation;
        }
        .roulette-card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            pointer-events: none;
        }
        .roulette-card.flipped .roulette-card-inner {
            transform: rotateY(180deg);
        }
        .roulette-card-front, .roulette-card-back {
            position: absolute; inset: 0;
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            pointer-events: none;
        }
        .roulette-card-front {
            background: linear-gradient(145deg, #6F4E37, #A0845C);
            color: rgba(255,255,255,0.45); font-size: 6rem;
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        .roulette-card-back {
            background: white;
            color: #fff;
            font-size: 7rem; font-weight: 900;
            text-shadow: 0 3px 14px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5);
            transform: rotateY(180deg);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }
        /* Phase 3: 룰렛 */
        .roulette-spin-phase {
            flex: 1; display: none; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; width: 100%;
        }
        .roulette-spin-phase.active { display: flex; }
        .roulette-wheel-container {
            position: relative;
            width: min(92vw, 75vh);
            height: min(92vw, 75vh);
            margin: 30px 0;
        }
        .roulette-wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 6px solid rgba(255,255,255,0.35);
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.35), inset 0 0 20px rgba(0,0,0,0.15);
        }
        .roulette-wheel svg {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .roulette-segment {
            position: absolute;
            width: 0; height: 0;
            left: 50%; top: 50%;
            transform-origin: 0 0;
        }
        .roulette-segment-label {
            position: absolute;
            color: white; font-weight: 800; font-size: 1.3rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.4);
        }
        .close-hint {
            position: absolute;
            top: 64px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,107,0,0.95);
            color: white;
            font-size: 1.2rem; font-weight: 800;
            padding: 10px 22px;
            border-radius: 22px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            letter-spacing: 0.3px;
            z-index: 20;
            white-space: nowrap;
            animation: closeHintPulse 0.4s ease-out;
        }
        @keyframes closeHintPulse {
            0% { transform: translate(-50%, -8px) scale(1.15); opacity: 0.4; }
            100% { transform: translate(-50%, 0) scale(1); opacity: 1; }
        }
        .roulette-pointer {
            position: absolute; top: -28px; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 26px solid transparent;
            border-right: 26px solid transparent;
            border-top: 44px solid #FF6B00;
            z-index: 5;
            filter: drop-shadow(0 3px 8px rgba(0,0,0,0.45));
        }

        /* ========== 공통 당첨 오버레이 ========== */
        .winner-overlay {
            position: fixed; inset: 0; z-index: 4000;
            background: rgba(0,0,0,0.85);
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            color: white;
        }
        .winner-overlay.active { display: flex; }
        .winner-message {
            font-size: 2rem; font-weight: 800;
            text-align: center;
            animation: winnerAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            line-height: 1.4;
        }
        .winner-sub {
            font-size: 1.1rem; color: rgba(255,255,255,0.7);
            margin-top: 16px;
            animation: winnerAppear 0.8s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .winner-emoji {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: winnerAppear 0.8s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes winnerAppear {
            from { opacity: 0; transform: scale(0.5) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .confetti-piece {
            position: fixed;
            width: 10px; height: 10px;
            top: -10px;
            z-index: 4001;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            to { top: 110vh; transform: rotate(720deg); }
        }

        /* 반응형 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px 15px;
                margin-bottom: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header .subtitle {
                font-size: 0.95rem;
            }

            .today-section {
                margin-bottom: 30px;
            }

            .today-section h2,
            .history-section h2 {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }

            .coffee-cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .coffee-card {
                padding: 24px 20px;
            }

            .coffee-card-title {
                font-size: 1.4rem;
            }

            .history-section {
                padding: 20px 15px;
            }

            .game-select { flex-direction: column; gap: 16px; min-height: 50vh; }
            .game-card { max-width: 180px; width: 80%; }
            .roulette-count-num { font-size: 4rem; }
            .roulette-card { width: 232px; height: 320px; }
            .roulette-card-front { font-size: 5.5rem; }
            .roulette-card-back { font-size: 6.4rem; }
            /* roulette-wheel-container는 상단의 min(92vw,75vh) 규칙 유지 */

            /* 모바일에서 테이블 숨기고 카드 표시 */
            .desktop-table {
                display: none;
            }

            .mobile-cards {
                display: block;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .coffee-card {
                transition: none;
            }
            .coffee-card:hover {
                transform: none;
            }
            .modal {
                animation: none;
            }
            .modal-content {
                animation: none;
            }
            .history-card {
                transition: none;
            }
            .history-card:hover {
                transform: none;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.7rem;
            }

            .header .subtitle {
                font-size: 0.85rem;
            }

            .today-section h2,
            .history-section h2 {
                font-size: 1.3rem;
                padding-left: 8px;
                border-left: 4px solid #D2691E;
            }

            .coffee-card {
                padding: 15px;
            }

            .coffee-card-title {
                font-size: 1.1rem;
            }

            .coffee-detail-label {
                min-width: 70px;
                font-size: 0.9rem;
            }

            .history-section {
                padding: 15px 12px;
            }

            .history-card {
                padding: 12px;
            }

            .history-card-title {
                font-size: 1rem;
            }

            .history-card-row {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>오늘의 커피</h1>
            <p class="subtitle">매일 다른 92도씨 로스터리 커피를 만나보세요</p>
        </div>

        <!-- 탭 네비게이션 -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="coffee" onclick="switchTab('coffee')">☕ 오늘의커피</button>
            <button class="tab-btn" data-tab="game" onclick="switchTab('game')">🎲 누가쏠까?</button>
        </div>

        <!-- 탭 1: 오늘의커피 -->
        <div id="tab-coffee" class="tab-panel active">
            <div id="content">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>커피 정보를 불러오는 중…</div>
                </div>
            </div>
        </div>

        <!-- 탭 2: 누가쏠까? -->
        <div id="tab-game" class="tab-panel">
            <div class="game-select">
                <div class="game-card" onclick="startFingerGame()">
                    <div class="game-card-icon">👆</div>
                    <div class="game-card-label">손가락</div>
                </div>
                <div class="game-card" onclick="startRouletteGame()">
                    <div class="game-card-icon">🎡</div>
                    <div class="game-card-label">룰렛</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 손가락 게임 풀스크린 -->
    <div class="finger-game" id="finger-game">
        <div class="finger-game-header">
            <button class="finger-game-close" onclick="closeFingerGame()">&times;</button>
            <div class="finger-game-status" id="finger-status">손가락을 대세요</div>
        </div>
        <div class="finger-game-area" id="finger-area"></div>
    </div>

    <!-- 룰렛 게임 풀스크린 -->
    <div class="roulette-game" id="roulette-game">
        <div class="roulette-game-header">
            <span class="roulette-game-title">🎡 룰렛</span>
            <button class="roulette-game-close" onclick="closeRouletteGame()">&times;</button>
        </div>
        <div class="close-hint" id="roulette-close-hint" style="display:none;"></div>
        <!-- Phase 1: 인원 설정 -->
        <div class="roulette-setup" id="roulette-setup">
            <div class="roulette-count-row">
                <button class="roulette-count-btn" onclick="changeRouletteCount(-1)">−</button>
                <div class="roulette-count-num" id="roulette-count">2</div>
                <button class="roulette-count-btn" onclick="changeRouletteCount(1)">+</button>
            </div>
            <button class="roulette-start-btn" onclick="startRouletteCards()">START</button>
        </div>
        <!-- Phase 2: 카드 선택 -->
        <div class="roulette-cards-phase" id="roulette-cards-phase">
            <div class="roulette-instruction" id="roulette-instruction">한 명씩 카드를 누르세요</div>
            <div class="roulette-cards-grid" id="roulette-cards-grid"></div>
        </div>
        <!-- Phase 3: 룰렛 회전 -->
        <div class="roulette-spin-phase" id="roulette-spin-phase">
            <div class="roulette-wheel-container">
                <div class="roulette-pointer"></div>
                <div class="roulette-wheel" id="roulette-wheel"></div>
            </div>
        </div>
    </div>

    <!-- 공통 당첨 오버레이 -->
    <div class="winner-overlay" id="winner-overlay">
        <div class="winner-emoji" id="winner-emoji">🎉</div>
        <div class="winner-message" id="winner-message"></div>
        <div class="winner-sub">덕분에 잘 먹겠습니다</div>
    </div>

    <!-- PIN 모달 (APK 히든 진입) -->
    <div class="pin-modal-backdrop hidden" id="pin-modal">
      <div class="pin-modal">
        <h2>관리자 인증</h2>
        <p>PIN을 입력하세요.</p>
        <input type="password" inputmode="numeric" pattern="[0-9]*"
               id="admin-pin-input" maxlength="8" autocomplete="off">
        <div class="pin-modal-error" id="admin-pin-error">PIN이 올바르지 않습니다.</div>
        <div class="pin-modal-actions">
          <button class="pin-modal-btn secondary" id="admin-pin-cancel" type="button">취소</button>
          <button class="pin-modal-btn" id="admin-pin-submit" type="button">확인</button>
        </div>
      </div>
    </div>

    <!-- 커피 상세 모달 -->
    <div id="coffeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-button" onclick="closeCoffeeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        async function loadCoffeeData() {
            try {
                const response = await fetch('/api/coffee');
                
                if (!response.ok) {
                    throw new Error(`서버 응답 오류: ${response.status}`);
                }
                
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || '데이터를 불러오는데 실패했습니다.');
                }

                renderContent(data);
            } catch (error) {
                console.error('Error:', error);
                
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <div class="error-title">⚠️ 서버 연결 오류</div>
                        <p style="margin: 15px 0;">서버에 연결할 수 없습니다.</p>
                        <button onclick="location.reload()" style="
                            margin-top: 20px;
                            padding: 12px 30px;
                            background: #6F4E37;
                            color: white;
                            border: none;
                            border-radius: 8px;
                            font-size: 1rem;
                            cursor: pointer;
                        ">🔄 다시 시도</button>
                    </div>
                `;
            }
        }

        function formatDate(dateObj) {
            if (!dateObj) return '-';
            
            const start = dateObj.start;
            const end = dateObj.end;
            
            if (!start) return '-';
            
            const startDate = new Date(start);
            const startStr = `${startDate.getFullYear()}년 ${startDate.getMonth() + 1}월 ${startDate.getDate()}일`;
            
            if (end) {
                const endDate = new Date(end);
                const endStr = `${endDate.getFullYear()}년 ${endDate.getMonth() + 1}월 ${endDate.getDate()}일`;
                return `${startStr} ~ ${endStr}`;
            }
            
            return startStr;
        }

        function formatDateShort(dateObj) {
            if (!dateObj) return '-';
            const start = dateObj.start;
            const end = dateObj.end;
            
            if (!start) return '-';
            
            const startDate = new Date(start);
            const startStr = `${startDate.getMonth() + 1}/${startDate.getDate()}`;
            
            if (end) {
                const endDate = new Date(end);
                const endStr = `${endDate.getMonth() + 1}/${endDate.getDate()}`;
                return `${startStr} ~ ${endStr}`;
            }
            
            return startStr;
        }

        function getProcessBadgeClass(process) {
            if (!process) return '';
            const processLower = process.toLowerCase();
            if (processLower.includes('워시드') || processLower.includes('washed')) return 'badge-washed';
            if (processLower.includes('내추럴') || processLower.includes('natural')) return 'badge-natural';
            if (processLower.includes('무산소') || processLower.includes('anaerobic')) return 'badge-anaerobic';
            if (processLower.includes('사탕수수') || processLower.includes('sugar')) return 'badge-sugarcane';
            return 'badge-washed';
        }

        function getStatusBadgeClass(status) {
            if (!status) return '';
            if (status === '진행 중') return 'badge-진행중';
            if (status === '완료') return 'badge-완료';
            if (status === '시작 전') return 'badge-시작전';
            if (status === '예정') return 'badge-예정';
            return '';
        }

        // 모달 팝업 관련 함수
        function openCoffeeModal(coffee) {
            const modal = document.getElementById('coffeeModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            // 모달 제목
            modalTitle.textContent = coffee.커피 || '제목 없음';

            // 모달 내용
            let bodyHtml = '';

            if (coffee.프로세싱) {
                bodyHtml += `
                    <div class="modal-detail">
                        <span class="modal-detail-label">프로세싱</span>
                        <div class="modal-detail-value">
                            <span class="process-badge ${getProcessBadgeClass(coffee.프로세싱)}">
                                ${coffee.프로세싱}
                            </span>
                        </div>
                    </div>

        function renderContent(data) {
