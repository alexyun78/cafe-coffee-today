        // ---------- 히스토리 뷰 토글 + 달력 ----------
        let historyCalMonth = null;

        function setHistoryView(mode) {
            window.historyViewMode = mode;
            const listBtn = document.getElementById('view-list');
            const calBtn = document.getElementById('view-calendar');
            if (listBtn) { listBtn.classList.toggle('active', mode === 'list'); listBtn.setAttribute('aria-pressed', mode === 'list'); }
            if (calBtn)  { calBtn.classList.toggle('active', mode === 'calendar'); calBtn.setAttribute('aria-pressed', mode === 'calendar'); }
            const container = document.getElementById('history-content');
            if (!container) return;
            if (mode === 'calendar') {
                container.innerHTML = renderHistoryCalendar();
            } else {
                const data = window.coffeeHistoryData || { history: [] };
                container.innerHTML = renderHistory(data.history || []);
            }
        }

        function changeHistoryCalMonth(delta) {
            const d = new Date(historyCalMonth.year, historyCalMonth.month + delta, 1);
            historyCalMonth = { year: d.getFullYear(), month: d.getMonth() };
            const c = document.getElementById('history-content');
            if (c) c.innerHTML = renderHistoryCalendar();
        }

        function goHistoryCalToday() {
            const now = new Date();
            historyCalMonth = { year: now.getFullYear(), month: now.getMonth() };
            const c = document.getElementById('history-content');
            if (c) c.innerHTML = renderHistoryCalendar();
        }

        function renderHistoryCalendar() {
            if (!historyCalMonth) {
                const now = new Date();
                historyCalMonth = { year: now.getFullYear(), month: now.getMonth() };
            }
            const { year, month } = historyCalMonth;
            const data = window.coffeeHistoryData || { today: [], history: [] };
            const all = [...(data.today || []), ...(data.history || [])];
            window.coffeeAllForCal = all;

            const byDate = {};
            all.forEach((it, idx) => {
                const d = (it && it['제공일'] && it['제공일'].start) || '';
                if (!d) return;
                (byDate[d] = byDate[d] || []).push({ it, idx });
            });

            const firstOfMonth = new Date(year, month, 1);
            const lastOfMonth = new Date(year, month + 1, 0);
            const gridStart = new Date(year, month, 1 - firstOfMonth.getDay());
            const gridEnd = new Date(year, month + 1, 6 - lastOfMonth.getDay());
            const today = ymdLocalCal(new Date());

            const dayLabels = ['일', '월', '화', '수', '목', '금', '토'];
            const dayCls = ['sun', '', '', '', '', '', 'sat'];

            let html = `
                <div class="hcal-month-nav">
                    <button onclick="changeHistoryCalMonth(-1)" aria-label="이전 달">‹</button>
                    <h3>${year}년 ${month + 1}월</h3>
                    <button onclick="changeHistoryCalMonth(1)" aria-label="다음 달">›</button>
                    <button class="hcal-today-btn" onclick="goHistoryCalToday()">오늘</button>
                </div>
                <div class="history-calendar">
            `;
            for (let i = 0; i < 7; i++) {
                html += `<div class="hcal-day-header ${dayCls[i]}">${dayLabels[i]}</div>`;
            }

            const cur = new Date(gridStart);
            while (cur <= gridEnd) {
                const ymd = ymdLocalCal(cur);
                const dow = cur.getDay();
                const inMonth = (cur.getMonth() === month);
                const isToday = (ymd === today);
                const items = byDate[ymd] || [];

                html += `<div class="hcal-cell ${inMonth ? '' : 'hcal-cell-out'} ${isToday ? 'hcal-cell-today' : ''}">`;
                html += `<div class="hcal-date ${dayCls[dow]} ${isToday ? 'hcal-date-today' : ''}">${cur.getDate()}</div>`;
                if (items.length) {
                    html += `<div class="hcal-coffees">`;
                    for (const { it, idx } of items) {
                        const name = escapeCalText(it['커피'] || '');
                        const roast = (it['로스팅'] && it['로스팅'].start) || '';
                        const statusCls = String(it['상태'] || '').replace(/\s/g, '');
                        html += `<div class="hcal-coffee hcal-coffee-${statusCls}" onclick="openCoffeeModal(window.coffeeAllForCal[${idx}])">`;
                        html += `<div class="hcal-coffee-name">${name}</div>`;
                        if (roast) html += `<div class="hcal-coffee-roast">🫘 ${escapeCalText(roast)}</div>`;
                        html += `</div>`;
                    }
                    html += `</div>`;
                }
                html += `</div>`;
                cur.setDate(cur.getDate() + 1);
            }
            html += `</div>`;
            return html;
        }

        function ymdLocalCal(d) {
            return d.getFullYear() + '-' +
                   String(d.getMonth() + 1).padStart(2, '0') + '-' +
                   String(d.getDate()).padStart(2, '0');
        }

        function escapeCalText(s) {
            return String(s).replace(/[&<>"']/g, (c) => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // 페이지 로드 시 데이터 가져오기
        loadCoffeeData();

        // 5분마다 자동 새로고침
        setInterval(loadCoffeeData, 5 * 60 * 1000);

        // ---------- APK 자동 업데이트 체크 ----------
        (function checkAppUpdate() {
          // Android WebView 안에서만 실행
          const ua = navigator.userAgent;
          if (!/Android.*wv\)|; wv\)/.test(ua)) return;

          // 실제 설치된 APK 버전은 User-Agent에 'CafeCoffeeApp/x.y.z' 로 찍혀 있음
          // (CI 빌드가 capacitor.config.json의 appendUserAgent를 version.json 값으로 주입)
          const m = ua.match(/CafeCoffeeApp\/([\d.]+)/);
          const installedVer = m ? m[1] : null;
          // User-Agent에 버전이 없으면(구버전 APK) 비교 불가능하므로 조용히 종료
          if (!installedVer) return;

          fetch('/static/downloads/cafe-coffee-version.json')
            .then(r => r.ok ? r.json() : null)
            .catch(() => null)
            .then(info => {
              if (!info || !info.version) return;
              const serverVer = info.version;
              const dismissedVer = localStorage.getItem('cafe-coffee-apk-dismissed');

              // 설치본이 서버 최신과 같거나 이미 이 버전을 무시했으면 표시 안 함
              if (serverVer === installedVer || serverVer === dismissedVer) return;
              if (compareVersion(installedVer, serverVer) >= 0) return;

              // 업데이트 배너 표시
              const banner = document.createElement('div');
              banner.id = 'update-banner';
              banner.innerHTML = `
                <div style="
                  position:fixed; bottom:0; left:0; right:0; z-index:500;
                  background:linear-gradient(135deg,#6F4E37,#8B6F47);
                  color:white; padding:16px 20px;
                  display:flex; align-items:center; justify-content:space-between;
                  gap:12px; box-shadow:0 -4px 20px rgba(0,0,0,0.2);
                ">
                  <div style="flex:1; font-size:0.9rem;">
                    <strong>새 버전(v${serverVer})이 있습니다</strong><br>
                    <span style="opacity:0.85; font-size:0.8rem;">업데이트하면 더 나은 경험을 할 수 있어요</span>
                  </div>
                  <a href="/apk" style="
                    background:white; color:#6F4E37; padding:10px 18px;
                    border-radius:8px; text-decoration:none; font-weight:600;
                    font-size:0.85rem; white-space:nowrap;
                  ">업데이트</a>
                  <button onclick="
                    localStorage.setItem('cafe-coffee-apk-dismissed','${serverVer}');
                    this.closest('#update-banner').remove();
                  " style="
                    background:none; border:none; color:rgba(255,255,255,0.7);
                    font-size:1.3rem; cursor:pointer; padding:4px 8px;
                  ">&times;</button>
                </div>
              `;
              document.body.appendChild(banner);
            });

          function compareVersion(a, b) {
            const pa = a.split('.').map(n => parseInt(n, 10) || 0);
            const pb = b.split('.').map(n => parseInt(n, 10) || 0);
            for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
              const x = pa[i] || 0, y = pb[i] || 0;
              if (x !== y) return x - y;
            }
            return 0;
          }
        })();

        // ========== 탭 전환 ==========
        let gameTabAutoSwitchTimer = null;
        function scheduleGameTabAutoSwitch() {
          clearTimeout(gameTabAutoSwitchTimer);
          gameTabAutoSwitchTimer = setTimeout(() => {
            const tabBtn = document.querySelector('.tab-btn[data-tab="game"]');
            if (tabBtn && tabBtn.classList.contains('active')) {
              switchTab('coffee');
            }
          }, 3000);
        }
        function cancelGameTabAutoSwitch() {
          clearTimeout(gameTabAutoSwitchTimer);
          gameTabAutoSwitchTimer = null;
        }
        function switchTab(tabId) {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tabId));
          if (tabId === 'game') scheduleGameTabAutoSwitch();
          else cancelGameTabAutoSwitch();
        }

        // ========== 공통: 색상 풀 ==========
        const COLORS = [
          '#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8',
          '#F7DC6F','#BB8FCE','#85C1E9','#F1948A','#82E0AA'
        ];

        // ========== 공통: 당첨 표시 ==========
        function showWinner(message, callback) {
          const overlay = document.getElementById('winner-overlay');
          const msgEl = document.getElementById('winner-message');
          msgEl.textContent = message;
          overlay.classList.add('active');
          spawnConfetti();
          setTimeout(() => {
            overlay.classList.remove('active');
            document.querySelectorAll('.confetti-piece').forEach(c => c.remove());
            if (callback) callback();
            // 오늘의커피 탭으로 자동 전환
            switchTab('coffee');
          }, 3000);
        }

        function spawnConfetti() {
          for (let i = 0; i < 40; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
            c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
            c.style.animationDelay = Math.random() * 0.5 + 's';
            c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            c.style.width = (6 + Math.random() * 8) + 'px';
            c.style.height = (6 + Math.random() * 8) + 'px';
            document.body.appendChild(c);
          }
        }

        // ========== 손가락 게임 ==========
        const ANIMALS = ['사자','호랑이','양','고양이','강아지','얼룩말','기린','낙타','사슴','악어','코끼리','공작새','고래'];
        const FINGER_COLORS = [
          '#FF6B6B','#4ECDC4','#45B7D1','#FFA07A','#98D8C8',
          '#F7DC6F','#BB8FCE','#85C1E9','#F1948A','#82E0AA',
          '#F39C12','#E74C3C','#9B59B6'
        ];

        let fingerTouches = {};      // id -> {x, y, color, animal}
        let fingerTimer = null;      // 2초 대기 타이머
        let countdownInterval = null;
        let countdownValue = 3;
        let fingerIdleTimer = null;      // 5초 idle → 종료 카운트
        let fingerCloseInterval = null;  // 종료 카운트(3초) 인터벌
        let fingerCloseValue = 3;
        let fingerGameActive = false;
        let fingerWinnerShown = false;
        let fingerAudioCtx = null;

        function startFingerGame() {
          cancelGameTabAutoSwitch();
          const game = document.getElementById('finger-game');
          game.classList.add('active');
          fingerGameActive = true;
          fingerWinnerShown = false;
          fingerTouches = {};
          clearFingerTimers();
          document.querySelectorAll('.touch-circle').forEach(c => c.remove());
          updateFingerStatus();

          const area = document.getElementById('finger-area');
          area.addEventListener('touchstart', onFingerTouch, { passive: false });
          area.addEventListener('touchmove', onFingerMove, { passive: false });
          area.addEventListener('touchend', onFingerEnd, { passive: false });
          area.addEventListener('touchcancel', onFingerEnd, { passive: false });
          // 마우스 폴백 (데스크톱 테스트용)
          area.addEventListener('mousedown', onMouseDown);

          // idle 타이머 무장 (5초 무반응 시 종료 카운트)
          resetFingerWait();
        }

        function closeFingerGame() {
          const game = document.getElementById('finger-game');
          game.classList.remove('active');
          fingerGameActive = false;
          fingerWinnerShown = false;
          clearFingerTimers();
          fingerTouches = {};
          document.querySelectorAll('.touch-circle').forEach(c => c.remove());
          const area = document.getElementById('finger-area');
          area.removeEventListener('touchstart', onFingerTouch);
          area.removeEventListener('touchmove', onFingerMove);
          area.removeEventListener('touchend', onFingerEnd);
          area.removeEventListener('touchcancel', onFingerEnd);
          area.removeEventListener('mousedown', onMouseDown);
          const tabBtn = document.querySelector('.tab-btn[data-tab="game"]');
          if (tabBtn && tabBtn.classList.contains('active')) scheduleGameTabAutoSwitch();
        }

        function clearFingerTimers() {
          clearTimeout(fingerTimer); fingerTimer = null;
          clearInterval(countdownInterval); countdownInterval = null;
          clearTimeout(fingerIdleTimer); fingerIdleTimer = null;
          clearInterval(fingerCloseInterval); fingerCloseInterval = null;
        }

        function startFingerCloseCountdown() {
          if (!fingerGameActive || fingerWinnerShown) return;
          fingerCloseValue = 3;
          showFingerCloseTick();
          fingerCloseInterval = setInterval(() => {
            fingerCloseValue--;
            if (fingerCloseValue <= 0) {
              clearInterval(fingerCloseInterval);
              fingerCloseInterval = null;
              closeFingerGame();
              switchTab('coffee');
            } else {
              showFingerCloseTick();
            }
          }, 1000);
        }

        function showFingerCloseTick() {
          const el = document.getElementById('finger-status');
          el.classList.remove('countdown', 'winner');
          void el.offsetWidth;
          el.classList.add('countdown');
          el.textContent = fingerCloseValue + '초 뒤 종료';
          playFingerBeep(480, 0.15);
        }

        function pickUniqueFingerColor() {
          const used = new Set(Object.values(fingerTouches).map(t => t.color));
          const available = FINGER_COLORS.filter(c => !used.has(c));
          const pool = available.length ? available : FINGER_COLORS;
          return pool[Math.floor(Math.random() * pool.length)];
        }

        function pickUniqueFingerAnimal() {
          const used = new Set(Object.values(fingerTouches).map(t => t.animal));
          const available = ANIMALS.filter(a => !used.has(a));
          const pool = available.length ? available : ANIMALS;
          return pool[Math.floor(Math.random() * pool.length)];
        }

        function onFingerTouch(e) {
          e.preventDefault();
          if (fingerWinnerShown) return;
          const area = document.getElementById('finger-area');
          const rect = area.getBoundingClientRect();
          for (const touch of e.changedTouches) {
            const id = touch.identifier;
            if (!fingerTouches[id]) {
              const color = pickUniqueFingerColor();
              const animal = pickUniqueFingerAnimal();
              fingerTouches[id] = {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top,
                color, animal
              };
              createTouchCircle(id, fingerTouches[id], area);
            }
          }
          resetFingerWait();
          updateFingerStatus();
        }

        function onFingerMove(e) {
          e.preventDefault();
          if (fingerWinnerShown) return;
          const area = document.getElementById('finger-area');
          const rect = area.getBoundingClientRect();
          for (const touch of e.changedTouches) {
            const id = touch.identifier;
            if (fingerTouches[id]) {
              fingerTouches[id].x = touch.clientX - rect.left;
              fingerTouches[id].y = touch.clientY - rect.top;
              const el = document.getElementById('touch-' + id);
              if (el) {
                el.style.left = fingerTouches[id].x + 'px';
                el.style.top = fingerTouches[id].y + 'px';
              }
            }
          }
        }

        function onFingerEnd(e) {
          e.preventDefault();
          if (fingerWinnerShown) return; // 당첨 후에는 원/라벨 유지
          for (const touch of e.changedTouches) {
            removeFingerTouch(touch.identifier);
          }
          resetFingerWait();
          updateFingerStatus();
        }

        function removeFingerTouch(id) {
          delete fingerTouches[id];
          const el = document.getElementById('touch-' + id);
          if (el) el.remove();
        }

        // 마우스 폴백 (데스크톱 테스트)
        let mouseClickId = 100;
        function onMouseDown(e) {
          if (fingerWinnerShown) return;
          const area = document.getElementById('finger-area');
          const rect = area.getBoundingClientRect();
          const id = 'mouse-' + (mouseClickId++);
          const color = pickUniqueFingerColor();
          const animal = pickUniqueFingerAnimal();
          fingerTouches[id] = { x: e.clientX - rect.left, y: e.clientY - rect.top, color, animal };
          createTouchCircle(id, fingerTouches[id], area);
          resetFingerWait();
          updateFingerStatus();
        }

        function createTouchCircle(id, data, area) {
          const el = document.createElement('div');
          el.className = 'touch-circle';
          el.id = 'touch-' + id;
          el.style.left = data.x + 'px';
          el.style.top = data.y + 'px';
          el.style.background = data.color;
          el.style.color = data.color;
          const label = document.createElement('span');
          label.className = 'touch-label';
          label.textContent = data.animal;
          el.appendChild(label);
          area.appendChild(el);
        }

        function updateFingerStatus() {
          const el = document.getElementById('finger-status');
          if (!el) return;
          el.classList.remove('countdown', 'winner');
          const count = Object.keys(fingerTouches).length;
          if (count === 0) el.textContent = '손가락을 대세요';
          else if (count === 1) el.textContent = '2명 이상 필요해요';
          else el.textContent = '그대로 유지하세요';
        }

        function resetFingerWait() {
          clearFingerTimers();
          countdownValue = 3;
          if (fingerWinnerShown) return;
          const touchCount = Object.keys(fingerTouches).length;
          if (touchCount === 0) {
            // "손가락을 대세요" 상태에서 5초간 무반응 → 종료 카운트다운
            fingerIdleTimer = setTimeout(() => startFingerCloseCountdown(), 5000);
            return;
          }
          if (touchCount < 2) return;
          fingerTimer = setTimeout(() => startFingerCountdown(), 2000);
        }

        function startFingerCountdown() {
          if (!fingerGameActive) return;
          if (Object.keys(fingerTouches).length < 2) return;
          countdownValue = 3;
          showFingerCountdownTick();
          countdownInterval = setInterval(() => {
            countdownValue--;
            if (countdownValue <= 0) {
              clearInterval(countdownInterval);
              countdownInterval = null;
              pickFingerWinner();
            } else {
              showFingerCountdownTick();
            }
          }, 1000);
        }

        function showFingerCountdownTick() {
          const el = document.getElementById('finger-status');
          el.classList.remove('countdown', 'winner');
          void el.offsetWidth;
          el.classList.add('countdown');
          el.textContent = countdownValue;
          playFingerBeep(700, 0.18);
        }

        function pickFingerWinner() {
          if (!fingerGameActive) return;
          const ids = Object.keys(fingerTouches);
          if (ids.length < 2) {
            updateFingerStatus();
            resetFingerWait();
            return;
          }
          playFingerBeep(1200, 0.5);
          fingerWinnerShown = true;
          const winnerId = ids[Math.floor(Math.random() * ids.length)];
          const winnerData = fingerTouches[winnerId];

          ids.forEach(id => {
            const el = document.getElementById('touch-' + id);
            if (!el) return;
            if (id === winnerId) el.classList.add('winner');
            else el.classList.add('loser');
          });

          const statusEl = document.getElementById('finger-status');
          statusEl.classList.remove('countdown');
          statusEl.classList.add('winner');
          statusEl.textContent = '🎉 ' + winnerData.animal + ' 당첨!';

          spawnConfetti();
          setTimeout(() => {
            document.querySelectorAll('.confetti-piece').forEach(c => c.remove());
            closeFingerGame();
            switchTab('coffee');
          }, 3500);
        }

        function playFingerBeep(freq, duration) {
          try {
            if (!fingerAudioCtx) fingerAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = fingerAudioCtx.createOscillator();
            const gain = fingerAudioCtx.createGain();
            osc.connect(gain);
            gain.connect(fingerAudioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.3, fingerAudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, fingerAudioCtx.currentTime + duration);
            osc.start();
            osc.stop(fingerAudioCtx.currentTime + duration);
          } catch (e) {}
        }

        // ========== 룰렛 게임 ==========
        let rouletteCount = 2;
        let rouletteNumbers = [];   // 셔플된 번호 배열
        let lastRouletteNumbers = []; // 직전 라운드 숫자 (재사용 방지)
        let rouletteFlipped = 0;
        let rouletteAudioCtx = null;
        let rouletteIdleTimer = null;
        let rouletteCloseInterval = null;
        let rouletteCloseValue = 3;

        function armRouletteIdle(ms = 5000) {
          clearRouletteIdle();
          rouletteIdleTimer = setTimeout(() => startRouletteCloseCountdown(), ms);
        }
        function clearRouletteIdle() {
          clearTimeout(rouletteIdleTimer); rouletteIdleTimer = null;
          clearInterval(rouletteCloseInterval); rouletteCloseInterval = null;
          const el = document.getElementById('roulette-close-hint');
          if (el) el.style.display = 'none';
        }
        function startRouletteCloseCountdown() {
          rouletteCloseValue = 3;
          showRouletteCloseTick();
          rouletteCloseInterval = setInterval(() => {
            rouletteCloseValue--;
            if (rouletteCloseValue <= 0) {
              clearInterval(rouletteCloseInterval);
              rouletteCloseInterval = null;
              closeRouletteGame();
              switchTab('coffee');
            } else {
              showRouletteCloseTick();
            }
          }, 1000);
        }
        function showRouletteCloseTick() {
          const el = document.getElementById('roulette-close-hint');
          if (el) {
            el.style.display = 'block';
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = '';
            el.textContent = rouletteCloseValue + '초 뒤 종료';
          }
          try { playTickSound(); } catch (e) {}
        }

        function startRouletteGame() {
          cancelGameTabAutoSwitch();
          const game = document.getElementById('roulette-game');
          game.classList.add('active');
          rouletteCount = 2;
          document.getElementById('roulette-count').textContent = '2';
          document.getElementById('roulette-setup').style.display = 'flex';
          document.getElementById('roulette-cards-phase').classList.remove('active');
          document.getElementById('roulette-spin-phase').classList.remove('active');
          armRouletteIdle();
        }

        function closeRouletteGame() {
          clearRouletteIdle();
          document.getElementById('roulette-game').classList.remove('active');
          const tabBtn = document.querySelector('.tab-btn[data-tab="game"]');
          if (tabBtn && tabBtn.classList.contains('active')) scheduleGameTabAutoSwitch();
        }

        function changeRouletteCount(delta) {
          rouletteCount = Math.max(2, rouletteCount + delta);
          document.getElementById('roulette-count').textContent = rouletteCount;
          armRouletteIdle();
        }

        function startRouletteCards() {
          document.getElementById('roulette-setup').style.display = 'none';
          const phase = document.getElementById('roulette-cards-phase');
          phase.classList.add('active');
          document.getElementById('roulette-instruction').textContent = '한 명씩 카드를 누르세요';

          // 1~N 번호를 매 라운드 다른 순서로 셔플 (직전 라운드와 동일 순서 방지)
          const sameAsLast = (arr) =>
            lastRouletteNumbers.length === arr.length &&
            lastRouletteNumbers.every((v, i) => v === arr[i]);
          rouletteNumbers = Array.from({ length: rouletteCount }, (_, i) => i + 1);
          let attempts = 0;
          do {
            for (let i = rouletteNumbers.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [rouletteNumbers[i], rouletteNumbers[j]] = [rouletteNumbers[j], rouletteNumbers[i]];
            }
            attempts++;
          } while (rouletteCount > 1 && sameAsLast(rouletteNumbers) && attempts < 20);
          lastRouletteNumbers = rouletteNumbers.slice();
          rouletteFlipped = 0;

          // 카드 생성
          const grid = document.getElementById('roulette-cards-grid');
          grid.innerHTML = '';
          for (let i = 0; i < rouletteCount; i++) {
            const card = document.createElement('div');
            card.className = 'roulette-card';
            card.dataset.index = i;
            const cardColor = COLORS[i % COLORS.length];
            card.innerHTML = `
              <div class="roulette-card-inner">
                <div class="roulette-card-front">?</div>
                <div class="roulette-card-back" style="background:${cardColor};">${rouletteNumbers[i]}</div>
              </div>
            `;
            const handler = (e) => {
              e.preventDefault();
              e.stopPropagation();
              flipRouletteCard(card, i);
            };
            card.addEventListener('pointerup', handler);
            grid.appendChild(card);
          }

          // 첫 카드 뒤집기까지 5초 대기
          armRouletteIdle();
        }

        function flipRouletteCard(card, index) {
          if (card.classList.contains('flipped')) return;
          card.classList.add('flipped');
          playTickSound();
          rouletteFlipped++;

          if (rouletteFlipped >= rouletteCount) {
            clearRouletteIdle();
            document.getElementById('roulette-instruction').textContent = '룰렛 시작!';
            setTimeout(() => {
              startRouletteWheel();
            }, 1000);
          } else {
            // 다음 카드 뒤집기까지 5초 대기
            armRouletteIdle();
          }
        }

        function startRouletteWheel() {
          document.getElementById('roulette-cards-phase').classList.remove('active');
          const spinPhase = document.getElementById('roulette-spin-phase');
          spinPhase.classList.add('active');

          buildRouletteWheel();

          // 뒤집힌 카드 중 랜덤으로 당첨 인덱스 결정
          const winnerIdx = Math.floor(Math.random() * rouletteCount);
          const winnerNum = rouletteNumbers[winnerIdx];
          const segAngle = 360 / rouletteCount;
          // 해당 세그먼트 중앙으로 멈추도록 각도 계산
          const targetAngle = 360 - (winnerIdx * segAngle + segAngle / 2);
          const totalRotation = 360 * 8 + targetAngle; // 8바퀴 + 목표

          const wheel = document.getElementById('roulette-wheel');
          wheel.style.transition = 'none';
          wheel.style.transform = 'rotate(0deg)';

          // 틱 사운드 시작
          let tickCount = 0;
          const tickInterval = setInterval(() => {
            playTickSound();
            tickCount++;
            if (tickCount > 30) clearInterval(tickInterval);
          }, 150);

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              wheel.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
              wheel.style.transform = `rotate(${totalRotation}deg)`;
            });
          });

          // 5초 후 당첨
          setTimeout(() => {
            clearInterval(tickInterval);
            document.getElementById('winner-emoji').textContent = '🎉';
            showWinner(winnerNum + '번 당첨!', () => {
              closeRouletteGame();
            });
          }, 5200);
        }

        function buildRouletteWheel() {
          const wheel = document.getElementById('roulette-wheel');
          wheel.innerHTML = '';
          wheel.style.transform = 'rotate(0deg)';
          wheel.style.transition = 'none';

          const segAngle = 360 / rouletteCount;
          const radius = 140;

          for (let i = 0; i < rouletteCount; i++) {
            // SVG 세그먼트
            const startAngle = i * segAngle;
            const endAngle = startAngle + segAngle;
            const startRad = (startAngle - 90) * Math.PI / 180;
            const endRad = (endAngle - 90) * Math.PI / 180;

            const x1 = radius + radius * Math.cos(startRad);
            const y1 = radius + radius * Math.sin(startRad);
            const x2 = radius + radius * Math.cos(endRad);
            const y2 = radius + radius * Math.sin(endRad);

            const largeArc = segAngle > 180 ? 1 : 0;
            const pathData = `M${radius},${radius} L${x1},${y1} A${radius},${radius} 0 ${largeArc},1 ${x2},${y2} Z`;

            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${radius * 2} ${radius * 2}`);
            svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
            svg.style.position = 'absolute';
            svg.style.left = '0';
            svg.style.top = '0';

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', pathData);
            path.setAttribute('fill', COLORS[i % COLORS.length]);
            path.setAttribute('stroke', 'rgba(255,255,255,0.3)');
            path.setAttribute('stroke-width', '2');
            svg.appendChild(path);

            // 라벨
            const midAngle = (startAngle + segAngle / 2 - 90) * Math.PI / 180;
            const labelR = radius * 0.65;
            const lx = radius + labelR * Math.cos(midAngle);
            const ly = radius + labelR * Math.sin(midAngle);

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', lx);
            text.setAttribute('y', ly);
            text.setAttribute('text-anchor', 'middle');
            text.setAttribute('dominant-baseline', 'central');
            text.setAttribute('fill', 'white');
            text.setAttribute('font-size', '22');
            text.setAttribute('font-weight', '800');
            text.textContent = rouletteNumbers[i];
            svg.appendChild(text);

            wheel.appendChild(svg);
          }
        }

        // Web Audio API 틱 사운드
        function playTickSound() {
          try {
            if (!rouletteAudioCtx) rouletteAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = rouletteAudioCtx.createOscillator();
            const gain = rouletteAudioCtx.createGain();
            osc.connect(gain);
            gain.connect(rouletteAudioCtx.destination);
            osc.frequency.value = 800 + Math.random() * 400;
            osc.type = 'sine';
            gain.gain.value = 0.08;
            gain.gain.exponentialRampToValueAtTime(0.001, rouletteAudioCtx.currentTime + 0.08);
            osc.start();
            osc.stop(rouletteAudioCtx.currentTime + 0.08);
          } catch(e) { /* 오디오 미지원 무시 */ }
        }

        // ---------- APK 히든 관리자 진입 (제목 5회 탭) ----------
        (function setupHiddenAdmin() {
          const ua = navigator.userAgent;
          if (!/Android.*wv\)|; wv\)/.test(ua)) return;

          const title = document.querySelector('.header h1');
          if (!title) return;

          let tapCount = 0;
          let tapTimer = null;

          title.style.cursor = 'default';
          title.addEventListener('click', (e) => {
            e.stopPropagation();
            const modal = document.getElementById('pin-modal');
            // 모달이 이미 열려있으면 무시
            if (!modal.classList.contains('hidden')) return;

            tapCount++;
            clearTimeout(tapTimer);
            tapTimer = setTimeout(() => { tapCount = 0; }, 2000);

            if (tapCount >= 5) {
              tapCount = 0;
              modal.classList.remove('hidden');
              document.getElementById('admin-pin-input').value = '';
              document.getElementById('admin-pin-error').style.display = 'none';
              document.getElementById('admin-pin-input').focus();
            }
          });

          document.getElementById('admin-pin-submit').addEventListener('click', async () => {
            const pin = document.getElementById('admin-pin-input').value.trim();
            try {
              const res = await fetch('/api/admin/verify', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pin }),
              });
              const data = await res.json();
              if (data.success) {
                document.getElementById('pin-modal').classList.add('hidden');
                window.location.href = '/admin';
              } else {
                document.getElementById('admin-pin-error').style.display = 'block';
              }
            } catch (e) {
              document.getElementById('admin-pin-error').style.display = 'block';
            }
          });

          document.getElementById('admin-pin-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('admin-pin-submit').click();
            if (e.key === 'Escape') closePinModal();
          });

          function closePinModal() {
            const modal = document.getElementById('pin-modal');
            modal.classList.add('hidden');
            document.getElementById('admin-pin-input').value = '';
            document.getElementById('admin-pin-error').style.display = 'none';
            tapCount = 0;
            clearTimeout(tapTimer);
          }

          document.getElementById('admin-pin-cancel').addEventListener('click', closePinModal);

          // 모달 backdrop 클릭은 내부 클릭 전파를 막되, 모달 자체는 닫지 않음
          document.getElementById('pin-modal').addEventListener('click', (e) => {
            e.stopPropagation();
          });
        })();
    </script>
</body>
