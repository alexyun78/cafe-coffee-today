name: Ingest Coffee Insights

# 매일 22:30 KST = 13:30 UTC. cron은 UTC 기준.
# /schedule 클라우드 루틴이 22:00 KST 에 Drive 에 sidecar JSON 을 올린 직후를 노린다.
on:
  schedule:
    - cron: "30 13 * * *"
  workflow_dispatch:
    # 수동 실행 가능 (Actions UI 의 "Run workflow")

# 워크플로가 자체 커밋을 푸시할 수 있도록 권한 부여
permissions:
  contents: write

concurrency:
  group: ingest-insights
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GITHUB_TOKEN 으로 푸시 → permissions.contents: write 필요
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.3 jinja2==3.1.4 PyMuPDF==1.24.10

      - name: Run insight ingest
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python scripts/ingest_insights.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 한 줄에 두 경로를 넣으면, 두 번째 경로가 비어 있을 때 git add 가
          # 전체 실패하고 || true 가 삼켜 첫 경로도 staging 안 되는 버그가 있다.
          # 두 줄로 분리하고 각각 무시.
          git add static/insights/ || true
          if [ -d static/img/insights/articles ]; then
            git add static/img/insights/articles/ || true
          fi
          if git diff --cached --quiet; then
            echo "변경 없음 — commit skip"
            exit 0
          fi
          TODAY=$(date -u +"%Y-%m-%d")
          git commit -m "chore(insights): ingest daily coffee insight (${TODAY})"
          git push
